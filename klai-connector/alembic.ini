[alembic]
script_location = alembic
sqlalchemy.url = driver://user:pass@localhost/dbname

# Required so alembic/env.py can `from app.models.connector import Base`
# without callers having to set PYTHONPATH=. — matches portal-api's
# pattern (klai-portal/backend/alembic.ini) and lets the container
# entrypoint run `alembic upgrade head` directly.
prepend_sys_path = .

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
