git_strategy:
  mode: personal
  provider: github
  personal:
    automation:
      auto_branch: true         # feature/SPEC-XXX branch per SPEC run
      auto_commit: true
      auto_pr: true             # PR aanmaken bij /moai sync
      auto_push: true           # pushen na commit
    branch_creation:
      auto_enabled: true
      prompt_always: false
    branch_prefix: feature/SPEC-
    main_branch: main
    push_to_remote: true
    workflow: github-flow
    environment: github
    github_integration: true
    commit_style:
      format: conventional
      scope_required: false
    hooks:
      commit_msg: warn
      pre_commit: enforce
      pre_push: warn
