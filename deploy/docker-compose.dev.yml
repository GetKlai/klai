# Dev override: parallel portal-api-dev running alongside prod portal-api.
#
# Usage on core-01:
#   docker compose -f docker-compose.yml -f docker-compose.dev.yml up -d portal-api-dev
#
# Isolation:
# - Own container (portal-api-dev)
# - Own image tag (:dev, built from feat/* branches)
# - Own database (klai_dev on shared postgres instance)
# - Own env file (.env.dev) with distinct secrets
# - Shared infra: postgres instance, redis, mongodb, qdrant, zitadel, connector, knowledge-ingest
#
# dev.getklai.com Caddy block routes /api/* -> portal-api-dev:8010
# getklai.getklai.com routes /api/* -> portal-api:8010 (unchanged)

services:
  portal-api-dev:
    image: ghcr.io/getklai/portal-api:dev
    restart: unless-stopped
    # Pull shared infra secrets (LiteLLM master key, Mongo root, etc.) from .env.
    # Dev-specific overrides (DATABASE_URL, encryption keys) are set below in `environment`.
    env_file: .env
    volumes:
      - caddy-tenants:/caddy/tenants
      - ./librechat:/librechat
    environment:
      DOMAIN: ${DOMAIN}
      ZITADEL_PAT: ${PORTAL_API_DEV_ZITADEL_PAT}
      # Same Klai Portal BFF OIDC app as prod (both my.getklai.com and
      # dev.getklai.com are registered redirect_uris). Without these, BFF
      # code exchange + refresh fail with invalid_client → /logged-out.
      ZITADEL_PORTAL_CLIENT_ID: ${ZITADEL_PORTAL_CLIENT_ID:-369262708920483857}
      ZITADEL_PORTAL_CLIENT_SECRET: ${PORTAL_API_ZITADEL_PORTAL_CLIENT_SECRET:-}
      DATABASE_URL: postgresql+asyncpg://portal_api_dev:${PORTAL_API_DEV_DB_PASSWORD}@postgres:5432/klai_dev
      DOCKER_HOST: tcp://docker-socket-proxy:2375
      INTERNAL_SECRET: ${PORTAL_API_DEV_INTERNAL_SECRET}
      SSO_COOKIE_KEY: ${PORTAL_API_DEV_SSO_COOKIE_KEY}
      VEXA_API_KEY: ${VEXA_BOT_MANAGER_API_KEY}
      VEXA_WEBHOOK_SECRET: ${VEXA_WEBHOOK_SECRET}
      PORTAL_SECRETS_KEY: ${PORTAL_API_DEV_PORTAL_SECRETS_KEY}
      ENCRYPTION_KEY: ${PORTAL_API_DEV_ENCRYPTION_KEY}
      # IMAP disabled in dev to avoid competing with prod for the shared mailbox.
      # Empty HOST + USERNAME is enough to disable; PORT stays valid int (default 993).
      IMAP_HOST: ""
      IMAP_PORT: "993"
      IMAP_USERNAME: ""
      IMAP_POLL_INTERVAL_SECONDS: "60"
      IMAP_PASSWORD: ""
      LIBRECHAT_MONGO_ROOT_URI: ${LIBRECHAT_MONGO_ROOT_URI}
      # Inter-service auth secrets MUST match prod (connector, docs-app,
      # knowledge-ingest are shared services that only know the prod secret).
      KLAI_CONNECTOR_SECRET: ${PORTAL_API_KLAI_CONNECTOR_SECRET}
      KNOWLEDGE_INGEST_SECRET: ${KNOWLEDGE_INGEST_SECRET}
      DOCS_INTERNAL_SECRET: ${DOCS_INTERNAL_SECRET}
      GITHUB_ADMIN_PAT: ${GITHUB_ADMIN_PAT}
      GITHUB_ORG: GetKlai
      # Dev uses its own Redis DB 1 for BFF sessions — independent from prod.
      # User needs to log in via dev.getklai.com to get a dev-scoped session;
      # my.getklai.com sessions won't carry over (the BFF cookie is visible
      # but its sid isn't in dev's Redis).
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/1
      QDRANT_URL: http://qdrant:6333
      QDRANT_API_KEY: ${QDRANT_API_KEY}
      ZITADEL_IDP_GOOGLE_ID: ${ZITADEL_IDP_GOOGLE_ID}
      ZITADEL_IDP_MICROSOFT_ID: ${ZITADEL_IDP_MICROSOFT_ID}
      FRONTEND_URL: https://dev.getklai.com
      GOOGLE_DRIVE_CLIENT_ID: ${GOOGLE_DRIVE_CLIENT_ID:-}
      GOOGLE_DRIVE_CLIENT_SECRET: ${GOOGLE_DRIVE_CLIENT_SECRET:-}
      MONGODB_CONTAINER_NAME: ${MONGODB_CONTAINER_NAME}
      MONGO_ROOT_USERNAME: ${MONGO_ROOT_USERNAME}
    networks:
      - klai-net
      - net-postgres
      - net-mongodb
      - net-redis
      - socket-proxy

  # ─── LiteLLM for dev ──────────────────────────────────────────────────
  # Same image + config as prod litellm, but the custom hook (klai_knowledge.py)
  # calls portal-api-dev instead of portal-api. This is the isolation point
  # so dev users' guardrails/retrieval come from klai_dev, not klai.
  litellm-dev:
    image: ghcr.io/berriai/litellm:main-stable
    restart: unless-stopped
    command: ["--config", "/app/config.yaml", "--port", "4000"]
    volumes:
      # Share the same model list + custom router + hook as prod.
      - ./litellm/config.yaml:/app/config.yaml:ro
      - ./litellm/klai_knowledge.py:/app/klai_knowledge.py:ro
      - ./litellm/custom_router.py:/app/custom_router.py:ro
    environment:
      PYTHONPATH: /app
      LITELLM_MASTER_KEY: ${LITELLM_MASTER_KEY}
      # Separate LiteLLM bookkeeping DB so dev team keys don't collide with prod.
      DATABASE_URL: postgresql://litellm:${LITELLM_DB_PASSWORD}@postgres:5432/litellm_dev
      STORE_MODEL_IN_DB: "True"
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/2
      MISTRAL_API_KEY: ${MISTRAL_API_KEY}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      DISABLE_ADMIN_UI: "True"
      KNOWLEDGE_RETRIEVE_URL: http://retrieval-api:8040/retrieve
      KNOWLEDGE_RETRIEVE_TIMEOUT: "60.0"
      KNOWLEDGE_INGEST_SECRET: ${KNOWLEDGE_INGEST_SECRET}
      # ↓↓↓ THE ISOLATION POINT ↓↓↓
      PORTAL_API_URL: http://portal-api-dev:8010
      PORTAL_INTERNAL_SECRET: ${PORTAL_API_DEV_INTERNAL_SECRET}
      KB_IMAGES_BASE_URL: https://dev.getklai.com
    networks:
      - klai-net
      - net-postgres
      - net-redis

  # ─── LibreChat for dev ────────────────────────────────────────────────
  # Separate container so dev chats live in their own MongoDB database
  # and route through litellm-dev. Same image + yaml/patches as prod tenant.
  librechat-dev:
    image: ghcr.io/danny-avila/librechat:latest
    container_name: librechat-dev
    restart: unless-stopped
    env_file: ./librechat/dev/.env
    environment:
      # Use URL-encoded REDIS_URI from .env (password contains /, +, = which break ioredis).
      # Prod librechat-getklai uses the same pattern (db 0); dev uses db 3 for isolation.
      REDIS_URI: ${REDIS_URI}/3
      KNOWLEDGE_INGEST_SECRET: ${KNOWLEDGE_INGEST_SECRET}
    volumes:
      - ./librechat/dev/librechat.yaml:/app/librechat.yaml:ro
      - ./librechat/dev/images:/app/client/public/images
      - ./librechat/patches/format.cjs:/app/node_modules/@librechat/agents/dist/cjs/messages/format.cjs:ro
      - ./librechat/patches/stream.cjs:/app/node_modules/@librechat/agents/dist/cjs/stream.cjs:ro
      - ./librechat/patches/search.cjs:/app/node_modules/@librechat/agents/dist/cjs/tools/search/search.cjs:ro
    networks:
      - klai-net
      - net-mongodb
      - net-meilisearch
      - net-redis
