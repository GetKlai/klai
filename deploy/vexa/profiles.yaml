profiles:
  meeting:
    image: "vexaai/vexa-bot:v20260315-2220"
    resources:
      memory_limit: "1536Mi"
      memory_request: "512Mi"
      cpu_limit: "2000m"
      cpu_request: "500m"
      shm_size: 1073741824  # 1GB shared memory — required for Chromium stability in Google Meet
    idle_timeout: 7200
    auto_remove: true
    env:
      LOG_LEVEL: "INFO"
    network_mode: "vexa-bots"
