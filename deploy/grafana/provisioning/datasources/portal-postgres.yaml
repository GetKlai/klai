apiVersion: 1

datasources:
  # Portal PostgreSQL — read-only access for business and product metrics
  - name: PortalPostgres
    type: postgres
    uid: portal-postgres
    url: postgres:5432
    access: proxy
    database: klai
    user: grafana_reader
    secureJsonData:
      password: ${GRAFANA_POSTGRES_PASSWORD}
    jsonData:
      sslmode: disable
      postgresVersion: 1500
      timescaledb: false
