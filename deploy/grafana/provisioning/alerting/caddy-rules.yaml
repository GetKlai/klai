# SPEC-OBS-001 Phase D — Caddy edge alerts (LogsQL via VictoriaLogs).
#
# Routed via spec=SPEC-OBS-001 → klai-ops-alerts-email (see policies.yaml).
#
#   R9 (adapted)  caddy_5xx_count_high   CRIT  >10 5xx in 5m (any upstream)
#
# SPEC v0.2.1 R9 wanted a 5xx ratio (>1% over 5m). Three deploy attempts
# proved that ratio computation across two LogsQL queries is fragile in
# Grafana 13 + VictoriaLogs plugin combo:
#
#   1. `reduce: count` on a multi-row LogsQL result fails with
#      "input data must be a wide series but got type long" — the plugin
#      returns long-format dataframes for log queries, Grafana SSE math
#      expects wide-format.
#   2. `| stats count() as n` inside the LogsQL query also returns long.
#   3. SSE math has no max() / no ternary, so /0 guards have to use +1
#      bias — which then doesn't matter because the queries fail before math.
#
# SEC-024's existing rule pattern (single LogsQL query + reduce: count +
# threshold) WORKS in production — but only because its query returns
# 0-1 rows in steady state. Multi-row results trip the shape mismatch.
#
# Pragmatic adaptation: use the SEC-024 pattern as-is, threshold on
# absolute count instead of ratio. >10 5xx in 5min approximates ">1% at
# normal traffic levels" (we see ~25 req/sec → ~7500 req/5min, so 10 5xx
# = 0.13% — slightly below the spec's 1%, conservatively safer). At
# lower traffic (e.g. midnight) this would fire on smaller spikes — that's
# acceptable: a burst of 10+ 5xx is operationally relevant regardless of
# total volume.
#
# Field shapes verified against production VictoriaLogs (2026-04-22):
#   service:caddy AND status:5*  →  matches "500", "502", etc.

apiVersion: 1

groups:
  - orgId: 1
    name: obs-001-caddy
    folder: Klai
    interval: 1m
    rules:

      # ── R9 (adapted to count): caddy_5xx_count_high ──────────────────────
      # UID kept as `obs-001-caddy-5xx-rate-high` (history) to avoid orphan
      # rule lingering after rename (file-provisioned rules don't auto-GC
      # on UID change, and DELETE via API requires provenance bypass that
      # the Grafana 13 X-Disable-Provenance header doesn't honor cleanly).
      - uid: obs-001-caddy-5xx-rate-high
        title: caddy_5xx_count_high
        condition: threshold
        data:
          - refId: query
            datasourceUid: victorialogs
            queryType: instant
            relativeTimeRange:
              from: 300
              to: 0
            model:
              refId: query
              datasource:
                type: victoriametrics-logs-datasource
                uid: victorialogs
              expr: 'service:caddy AND status:5*'
              queryType: instant
          - refId: reduce
            datasourceUid: __expr__
            relativeTimeRange:
              from: 300
              to: 0
            model:
              refId: reduce
              type: reduce
              reducer: count
              expression: query
          - refId: threshold
            datasourceUid: __expr__
            relativeTimeRange:
              from: 300
              to: 0
            model:
              refId: threshold
              type: threshold
              expression: reduce
              conditions:
                - evaluator: { params: [10], type: gt }
                  operator: { type: and }
                  reducer: { params: [], type: last }
                  type: query
        noDataState: OK
        execErrState: OK
        for: 5m
        keepFiringFor: 10m
        isPaused: false
        labels:
          severity: critical
          spec: SPEC-OBS-001
          service_group: caddy
        annotations:
          summary: 'Caddy returned >10 5xx responses over the last 5 min'
          runbook_url: 'docs/runbooks/platform-recovery.md#caddy-5xx-surge'
          description: |
            More than 10 Caddy responses in the last 5 minutes returned a
            5xx status code. This catches errors from any upstream behind
            Caddy (portal-api, grafana, auth, etc.) — see request.host in
            the matching log lines to identify which.

            Triage:
              1. VictoriaLogs query (Grafana → Explore → VictoriaLogs):
                   service:caddy AND status:5*
              2. Group by request.host to identify the affected upstream:
                   service:caddy AND status:5* | stats by(request.host) count() as hits
              3. Once upstream identified, see its container logs:
                   ssh core-01 "docker logs --tail 100 klai-core-{service}-1"
              4. If portal-api: see #portal-api-5xx-surge (this runbook section).
              5. If a different upstream: check its specific runbook section
                 or the generic container_down / container_restart_loop runbooks.
