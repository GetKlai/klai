# Contact points for Grafana-managed alerting.
#
# SMTP is configured in deploy/docker-compose.yml grafana service via GF_SMTP_*
# env vars (Cloud86 shared199.cloud86-host.io:587, from hello@getklai.com).
# GRAFANA_SMTP_PASSWORD lives in klai-infra/core-01/.env.sops.
#
# Defined here:
#   - klai-dev-alerts-email  — SEC-024-R13: security/dev alerts (proxy denials)
#   - klai-ops-alerts-email  — OBS-001-R4:  operational alerts (golden signals)
#   - heartbeat-kuma         — OBS-001-R22: webhook to Uptime Kuma push-monitor
#                                           on public-01 for dead-man's switch
#
# Both email contacts use the same SMTP backend but separate receivers so the
# ops and security ontvangerslijsten can later diverge without rule changes.
#
# heartbeat-kuma posts to Uptime Kuma's push API every 5 min. If Grafana
# stops pushing (alerter is down), Kuma fires its own SMTP alert via a
# notification channel configured directly in Kuma (not via klai-mailer
# or Cloud86 from Grafana — see runbook alerter-down-recovery for the
# isolation guarantees).

apiVersion: 1

contactPoints:
  - orgId: 1
    name: klai-dev-alerts-email
    receivers:
      - uid: klai-dev-alerts-email-primary
        type: email
        settings:
          addresses: mark.vletter@voys.nl
          singleEmail: true
          subject: "[Klai alert] {{ .GroupLabels.alertname }} — {{ .GroupLabels.service }}"
          message: |
            {{ range .Alerts -}}
            [{{ .Status | toUpper }}] {{ .Labels.alertname }}
            Service: {{ .Labels.service }}
            Severity: {{ .Labels.severity }}

            {{ .Annotations.summary }}

            {{ .Annotations.description }}

            Started: {{ .StartsAt }}
            Dashboard: {{ .GeneratorURL }}
            {{- end }}
        disableResolveMessage: false

  - orgId: 1
    name: klai-ops-alerts-email
    receivers:
      - uid: klai-ops-alerts-email-primary
        type: email
        settings:
          addresses: ${ALERTS_EMAIL_RECIPIENTS}
          singleEmail: false
          subject: '[KLAI-ALERT-{{ .CommonLabels.severity | default "info" }}] {{ .CommonLabels.alertname }}'
          message: |
            {{ range .Alerts -}}
            [{{ .Status | toUpper }}] {{ .Labels.alertname }}
            Service: {{ .Labels.service }}
            Severity: {{ .Labels.severity }}
            {{ if .Labels.request_id }}request_id: {{ .Labels.request_id }}{{ end }}
            {{ if .Labels.slug }}slug: {{ .Labels.slug }}{{ end }}
            {{ if .Labels.container }}container: {{ .Labels.container }}{{ end }}

            {{ .Annotations.summary }}

            {{ .Annotations.description }}

            Runbook: {{ .Annotations.runbook_url }}
            Started: {{ .StartsAt }}
            Dashboard: {{ .GeneratorURL }}
            {{- end }}
        disableResolveMessage: false

  - orgId: 1
    name: heartbeat-kuma
    receivers:
      - uid: heartbeat-kuma-push
        type: webhook
        settings:
          url: ${KUMA_HEARTBEAT_URL}
          # Grafana webhook only supports PUT/POST (refuses GET with
          # "webhook only supports HTTP methods PUT or POST"). Uptime
          # Kuma push API accepts POST with the same query-string
          # params already in the URL — body is ignored on push routes.
          httpMethod: POST
        disableResolveMessage: true
