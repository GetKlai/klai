# Notification routing for all Grafana-managed alerts.
#
# Fallback: grafana-default-email (Grafana auto-installed).
# Routes (evaluated in order, first match with continue:false wins):
#   - spec=SPEC-SEC-024       → klai-dev-alerts-email (SEC-024-R12/R13)
#   - spec=SPEC-INFRA-005     → klai-dev-alerts-email (SPEC-INFRA-005 persistence)
#   - spec=SPEC-OBS-001 + alert_type=heartbeat → heartbeat-kuma (OBS-001-R22)
#   - spec=SPEC-OBS-001       → klai-ops-alerts-email (OBS-001-R4/R5)
#
# Grouping + repeat_interval tuning per route:
#   - SEC/INFRA: repeat 24h — suppress email-floods from a wedged call-path
#   - OBS heartbeat: repeat 5m — push must arrive every 5 min at Uptime Kuma
#   - OBS ops: repeat 4h — default Grafana behaviour; per-rule `for:` handles debounce

apiVersion: 1

policies:
  - orgId: 1
    receiver: grafana-default-email   # existing default (installed by Grafana)
    group_by:
      - grafana_folder
      - alertname
    routes:
      - receiver: klai-dev-alerts-email
        matchers:
          - spec = SPEC-SEC-024
        group_by:
          - alertname
          - service
        group_wait: 10s
        group_interval: 1m
        repeat_interval: 24h
        continue: false

      - receiver: klai-dev-alerts-email
        matchers:
          - spec = SPEC-INFRA-005
        group_by:
          - alertname
          - service
        group_wait: 10s
        group_interval: 1m
        repeat_interval: 24h
        continue: false

      # OBS-001 heartbeat route lands in OBS-001 Phase E together with the
      # heartbeat-kuma contact point and the synthetic always-fires rule.

      - receiver: klai-ops-alerts-email
        matchers:
          - spec = SPEC-OBS-001
        group_by:
          - alertname
          - service
        group_wait: 10s
        group_interval: 1m
        repeat_interval: 4h
        continue: false
