model_list:
  # Primary: Mistral Small 4 (119B MoE, 6.5B active) — default for most tasks
  # MMLU-Pro 78, 256K context, best price/quality ratio
  - model_name: klai-primary
    litellm_params:
      model: mistral/mistral-small-latest
      api_key: os.environ/MISTRAL_API_KEY
    rpm: 20    # Mistral org limit: 1 req/s (60 RPM shared across all models)
    tpm: 45000 # Mistral model limit: 50K TPM for mistral-small

  # Fast: Mistral Small 4 — same model, separate alias for routing flexibility
  # Auto-selected by custom_router.py when scraped web content is detected
  - model_name: klai-fast
    litellm_params:
      model: mistral/mistral-small-latest
      api_key: os.environ/MISTRAL_API_KEY
    rpm: 20    # Share of the 60 RPM org limit
    tpm: 45000

  # Large: Mistral Large 3 (~675B MoE, ~40B active) — agentic / tool use flows
  # Auto-selected by custom_router.py when tool call history is detected
  - model_name: klai-large
    litellm_params:
      model: mistral/mistral-large-latest
      api_key: os.environ/MISTRAL_API_KEY
    rpm: 20    # Share of the 60 RPM org limit
    tpm: 45000

  # Fallback: Ollama on core-01 (CPU, only when Mistral is down)
  - model_name: klai-ollama-fallback
    litellm_params:
      model: ollama/phi3:mini
      api_base: http://ollama:11434

router_settings:
  routing_strategy: simple-shuffle
  optional_pre_call_checks:
    - enforce_model_rate_limits  # Queue requests when RPM/TPM limits are hit
  fallbacks:
    - klai-fast:
        - klai-ollama-fallback
    - klai-large:
        - klai-primary
  # klai-primary has no fallback — failures surface immediately with the real error

litellm_settings:
  drop_params: true             # vLLM/Ollama does not accept all OpenAI params
  request_timeout: 120
  num_retries: 2
  callbacks:
    - klai_knowledge.klai_knowledge_hook
    - custom_router.token_router

general_settings:
  master_key: os.environ/LITELLM_MASTER_KEY
  database_url: os.environ/DATABASE_URL
  store_model_in_db: true
