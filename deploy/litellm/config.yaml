model_list:
  # Primary: Mistral Small — for short prompts / simple questions (≤600 tokens)
  - model_name: klai-primary
    litellm_params:
      model: mistral/mistral-small-latest
      api_key: os.environ/MISTRAL_API_KEY

  # Fast: Mistral Nemo (12B) — for long prompts / web search (>600 tokens)
  # Routed automatically by custom_router.py based on token count
  - model_name: klai-fast
    litellm_params:
      model: mistral/open-mistral-nemo
      api_key: os.environ/MISTRAL_API_KEY

  # Fallback: Ollama on core-01 (CPU, only when Mistral is down)
  - model_name: klai-ollama-fallback
    litellm_params:
      model: ollama/phi3:mini
      api_base: http://ollama:11434

router_settings:
  routing_strategy: simple-shuffle
  fallbacks:
    - klai-primary:
        - klai-ollama-fallback
    - klai-fast:
        - klai-ollama-fallback

litellm_settings:
  drop_params: true             # vLLM/Ollama does not accept all OpenAI params
  request_timeout: 120
  num_retries: 2
  callbacks:
    - klai_knowledge.klai_knowledge_hook
    - custom_router.token_router

general_settings:
  master_key: os.environ/LITELLM_MASTER_KEY
  database_url: os.environ/DATABASE_URL
  store_model_in_db: true
