name: klai-core

networks:
  klai-net:
    driver: bridge
    name: klai-net
  socket-proxy:
    driver: bridge
    name: klai-socket-proxy
    internal: true   # only portal-api <-> docker-socket-proxy
  inference:
    driver: bridge
    name: klai-inference
    internal: true   # no outbound internet — only LiteLLM <-> Ollama
  monitoring:
    driver: bridge
    name: klai-monitoring
    internal: true   # VictoriaMetrics/VictoriaLogs/cAdvisor only via Alloy/Grafana
  net-mongodb:
    driver: bridge
    name: klai-net-mongodb
    internal: true   # only MongoDB <-> LibreChat containers
  net-postgres:
    driver: bridge
    name: klai-net-postgres
    internal: true   # only PostgreSQL <-> Zitadel, LiteLLM, GlitchTip
  net-redis:
    driver: bridge
    name: klai-net-redis
    internal: true   # only Redis <-> LiteLLM, GlitchTip, LibreChat
  net-meilisearch:
    driver: bridge
    name: klai-net-meilisearch
    internal: true   # only Meilisearch <-> LibreChat containers
  vexa-bots:
    name: vexa-bots
    driver: bridge
    # NOT internal — bot containers need internet egress to join meeting platforms

volumes:
  firecrawl-postgres-data:
  caddy-data:
  caddy-config:
  caddy-tenants:
  mongodb-data:
  postgres-data:
  redis-data:
  meilisearch-data:
  glitchtip-data:
  victoriametrics-data:
  victorialogs-data:
  grafana-data:
  gitea-data:
  qdrant-data:
  vexa-recordings-data:
  vexa-redis-data:
  scribe-audio-data:

# Default log rotation — prevents unbounded disk growth on json-file driver.
# Alloy captures logs in real-time via Docker socket, so rotated logs are only
# a local fallback. Configure Docker daemon default: /etc/docker/daemon.json
#   { "log-driver": "json-file", "log-opts": { "max-size": "50m", "max-file": "3" } }
# This applies to ALL containers without per-service config.

services:

  # ─── Caddy (reverse proxy + wildcard TLS) ────────────────────────────────
  caddy:
    image: ghcr.io/getklai/caddy-hetzner:latest
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile
      - caddy-tenants:/etc/caddy/tenants
      - caddy-data:/data
      - caddy-config:/config
      - /opt/klai/portal-dist:/srv/portal:ro
      - /opt/klai/caddy-logs:/var/log/caddy
    environment:
      HETZNER_AUTH_API_TOKEN: ${HETZNER_AUTH_API_TOKEN}
      DOMAIN: ${DOMAIN}
      ADMIN_EMAIL: ${ADMIN_EMAIL}
      GRAFANA_CADDY_USER: ${GRAFANA_CADDY_USER}
      GRAFANA_CADDY_HASH: ${GRAFANA_CADDY_HASH}
      VICTORIALOGS_INGEST_TOKEN: ${VICTORIALOGS_INGEST_TOKEN}
      VICTORIALOGS_BASIC_AUTH_B64: ${VICTORIALOGS_BASIC_AUTH_B64}
    networks:
      - klai-net
      - monitoring

  # ─── MongoDB ──────────────────────────────────────────────────────────────
  mongodb:
    image: mongo:8.2.7
    restart: unless-stopped
    volumes:
      - mongodb-data:/data/db
    environment:
      MONGO_INITDB_ROOT_USERNAME: klai
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD}
    networks:
      - net-mongodb
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ─── PostgreSQL ───────────────────────────────────────────────────────────
  postgres:
    image: pgvector/pgvector:pg18
    restart: unless-stopped
    volumes:
      - postgres-data:/var/lib/postgresql
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    environment:
      POSTGRES_USER: klai
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: klai
    networks:
      - net-postgres
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U klai"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ─── Redis ────────────────────────────────────────────────────────────────
  redis:
    image: redis:8-alpine
    restart: unless-stopped
    volumes:
      - redis-data:/data
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    command: redis-server --save 60 1 --appendonly yes --loglevel warning --requirepass ${REDIS_PASSWORD}
    networks:
      - net-redis
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a $REDIS_PASSWORD --no-auth-warning ping | grep PONG"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ─── Meilisearch ──────────────────────────────────────────────────────────
  meilisearch:
    image: getmeili/meilisearch:v1.42.1
    restart: unless-stopped
    volumes:
      - meilisearch-data:/meili_data
    environment:
      MEILI_ENV: production
      MEILI_MASTER_KEY: ${MEILI_MASTER_KEY}
      MEILI_NO_ANALYTICS: "true"
    networks:
      - net-meilisearch
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:7700/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ─── Zitadel ──────────────────────────────────────────────────────────────
  zitadel:
    image: ghcr.io/zitadel/zitadel:v4.13.1
    restart: unless-stopped
    ports:
      - "127.0.0.1:8080:8080"
    command: start-from-init --masterkey ${ZITADEL_MASTERKEY}
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      ZITADEL_DATABASE_POSTGRES_HOST: postgres
      ZITADEL_DATABASE_POSTGRES_PORT: "5432"
      ZITADEL_DATABASE_POSTGRES_DATABASE: zitadel
      ZITADEL_DATABASE_POSTGRES_USER_USERNAME: zitadel
      ZITADEL_DATABASE_POSTGRES_USER_PASSWORD: ${ZITADEL_DB_PASSWORD}
      ZITADEL_DATABASE_POSTGRES_USER_SSL_MODE: disable
      ZITADEL_DATABASE_POSTGRES_ADMIN_USERNAME: klai
      ZITADEL_DATABASE_POSTGRES_ADMIN_PASSWORD: ${POSTGRES_PASSWORD}
      ZITADEL_DATABASE_POSTGRES_ADMIN_SSL_MODE: disable
      ZITADEL_TLS_ENABLED: "false"
      ZITADEL_EXTERNALDOMAIN: auth.${DOMAIN}
      ZITADEL_EXTERNALPORT: "443"
      ZITADEL_EXTERNALSECURE: "true"
      ZITADEL_DEFAULTINSTANCE_ORG_NAME: ${ZITADEL_ORG_NAME}
      ZITADEL_DEFAULTINSTANCE_ORG_HUMAN_USERNAME: ${ZITADEL_ADMIN_USERNAME}
      ZITADEL_DEFAULTINSTANCE_ORG_HUMAN_FIRSTNAME: ${ZITADEL_ADMIN_FIRSTNAME}
      ZITADEL_DEFAULTINSTANCE_ORG_HUMAN_LASTNAME: ${ZITADEL_ADMIN_LASTNAME}
      ZITADEL_DEFAULTINSTANCE_ORG_HUMAN_EMAIL_ADDRESS: ${ZITADEL_ADMIN_EMAIL}
      ZITADEL_DEFAULTINSTANCE_ORG_HUMAN_EMAIL_VERIFIED: "true"
      ZITADEL_DEFAULTINSTANCE_ORG_HUMAN_PASSWORD: ${ZITADEL_ADMIN_PASSWORD}
      ZITADEL_DEFAULTINSTANCE_ORG_HUMAN_PASSWORDCHANGEREQUIRED: "false"
    networks:
      - klai-net
      - net-postgres

  # ─── LiteLLM ──────────────────────────────────────────────────────────────
  litellm:
    image: ghcr.io/berriai/litellm:v1.83.7-stable
    restart: unless-stopped
    command: ["--config", "/app/config.yaml", "--port", "4000"]
    volumes:
      - ./litellm/config.yaml:/app/config.yaml:ro
      - ./litellm/klai_knowledge.py:/app/klai_knowledge.py:ro
      - ./litellm/custom_router.py:/app/custom_router.py:ro
    environment:
      PYTHONPATH: /app
      LITELLM_MASTER_KEY: ${LITELLM_MASTER_KEY}
      DATABASE_URL: postgresql://litellm:${LITELLM_DB_PASSWORD}@postgres:5432/litellm
      STORE_MODEL_IN_DB: "True"
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      MISTRAL_API_KEY: ${MISTRAL_API_KEY}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      DISABLE_ADMIN_UI: "True"
      KNOWLEDGE_RETRIEVE_URL: http://retrieval-api:8040/retrieve
      KNOWLEDGE_RETRIEVE_TIMEOUT: "60.0"
      KNOWLEDGE_INGEST_SECRET: ${KNOWLEDGE_INGEST_SECRET}
      PORTAL_API_URL: http://portal-api:8010
      PORTAL_INTERNAL_SECRET: ${PORTAL_API_INTERNAL_SECRET}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - klai-net
      - inference
      - net-postgres
      - net-redis

  # ─── LibreChat (tenant: getklai) ─────────────────────────────────────────
  librechat-getklai:
    image: ghcr.io/danny-avila/librechat:v0.8.5-rc1
    container_name: librechat-getklai
    restart: unless-stopped
    env_file:
      - ./librechat/getklai/.env
    environment:
      REDIS_URI: ${REDIS_URI}
      KNOWLEDGE_INGEST_SECRET: ${KNOWLEDGE_INGEST_SECRET}
    volumes:
      - ./librechat/getklai/librechat.yaml:/app/librechat.yaml:ro
      - ./librechat/getklai/images:/app/client/public/images
      # Persistent patches - survive image updates until fixed upstream
      - ./librechat/patches/format.cjs:/app/node_modules/@librechat/agents/dist/cjs/messages/format.cjs:ro
      - ./librechat/patches/stream.cjs:/app/node_modules/@librechat/agents/dist/cjs/stream.cjs:ro
      - ./librechat/patches/search.cjs:/app/node_modules/@librechat/agents/dist/cjs/tools/search/search.cjs:ro
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - klai-net
      - net-mongodb
      - net-meilisearch
      - net-redis

  # ─── Ollama (CPU fallback) ────────────────────────────────────────────────
  ollama:
    image: ollama/ollama:0.21.0
    restart: unless-stopped
    volumes:
      - /opt/klai/ollama/models:/root/.ollama
    networks:
      - inference    # only reachable via LiteLLM, not from LibreChat/Caddy
    deploy:
      resources:
        limits:
          cpus: '6'
          memory: 12G

  # ─── Docker socket proxy (limits portal-api to required Docker API calls only)
  docker-socket-proxy:
    image: tecnativa/docker-socket-proxy:v0.4.2
    restart: unless-stopped
    environment:
      CONTAINERS: 1
      NETWORKS: 1
      POST: 1
      DELETE: 1
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - socket-proxy

  # ─── klai-mailer (Zitadel HTTP notification provider) ────────────────────
  klai-mailer:
    image: ghcr.io/getklai/klai-mailer:latest
    restart: unless-stopped
    ports:
      - "127.0.0.1:8001:8000"
    env_file: ./klai-mailer/.env
    networks:
      - klai-net

  # ─── Portal API (FastAPI tenant provisioning) ─────────────────────────────
  portal-api:
    image: ghcr.io/getklai/portal-api:latest
    restart: unless-stopped
    env_file: .env
    volumes:
      - caddy-tenants:/caddy/tenants
      - ./librechat:/librechat
    environment:
      DOMAIN: ${DOMAIN}
      ZITADEL_PAT: ${PORTAL_API_ZITADEL_PAT}
      DATABASE_URL: postgresql+asyncpg://portal_api:${PORTAL_API_DB_PASSWORD}@postgres:5432/klai
      DOCKER_HOST: tcp://docker-socket-proxy:2375
      INTERNAL_SECRET: ${PORTAL_API_INTERNAL_SECRET}
      SSO_COOKIE_KEY: ${PORTAL_API_SSO_COOKIE_KEY}
      VEXA_API_KEY: ${VEXA_BOT_MANAGER_API_KEY}
      VEXA_WEBHOOK_SECRET: ${VEXA_WEBHOOK_SECRET}
      PORTAL_SECRETS_KEY: ${PORTAL_API_PORTAL_SECRETS_KEY}
      ENCRYPTION_KEY: ${PORTAL_API_ENCRYPTION_KEY}
      IMAP_HOST: mail.getklai.com
      IMAP_PORT: "993"
      IMAP_USERNAME: meet@getklai.com
      IMAP_POLL_INTERVAL_SECONDS: "60"
      IMAP_PASSWORD: ${PORTAL_API_IMAP_PASSWORD}
      LIBRECHAT_MONGO_ROOT_URI: ${LIBRECHAT_MONGO_ROOT_URI}
      KLAI_CONNECTOR_SECRET: ${PORTAL_API_KLAI_CONNECTOR_SECRET}
      GITHUB_ADMIN_PAT: ${GITHUB_ADMIN_PAT}
      GITHUB_ORG: GetKlai
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      QDRANT_URL: http://qdrant:6333
      QDRANT_API_KEY: ${QDRANT_API_KEY}
      ZITADEL_IDP_GOOGLE_ID: ${ZITADEL_IDP_GOOGLE_ID}
      ZITADEL_IDP_MICROSOFT_ID: ${ZITADEL_IDP_MICROSOFT_ID}
      FRONTEND_URL: ${FRONTEND_URL:-}
      GOOGLE_DRIVE_CLIENT_ID: ${GOOGLE_DRIVE_CLIENT_ID:-}
      GOOGLE_DRIVE_CLIENT_SECRET: ${GOOGLE_DRIVE_CLIENT_SECRET:-}
      MONGODB_CONTAINER_NAME: ${MONGODB_CONTAINER_NAME}
      MONGO_ROOT_USERNAME: ${MONGO_ROOT_USERNAME}
    networks:
      - klai-net
      - net-postgres
      - net-mongodb
      - net-redis
      - socket-proxy

  # ─── GlitchTip (frontend error tracking) ────────────────────────────────
  glitchtip-web:
    image: glitchtip/glitchtip:6.1.6
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://glitchtip:${GLITCHTIP_DB_PASSWORD}@postgres:5432/glitchtip
      # GLITCHTIP_REDIS_URL: Redis password URL-encoded (special chars in password break redis:// parsing)
      REDIS_URL: ${GLITCHTIP_REDIS_URL}
      SECRET_KEY: ${GLITCHTIP_SECRET_KEY}
      PORT: "8000"
      GLITCHTIP_DOMAIN: https://errors.${DOMAIN}
      DEFAULT_FROM_EMAIL: errors@${DOMAIN}
      EMAIL_URL: ${GLITCHTIP_EMAIL_URL}
      ENABLE_USER_REGISTRATION: "False"
      CELERY_WORKER_AUTOSCALE: "1,3"
      CELERY_WORKER_MAX_TASKS_PER_CHILD: "10000"
    volumes:
      - glitchtip-data:/code/uploads
    networks:
      - klai-net
      - net-postgres
      - net-redis
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import urllib.request,sys,urllib.error\ntry:\n urllib.request.urlopen('http://127.0.0.1:8000/api/0/projects/')\nexcept urllib.error.HTTPError:\n pass\nexcept Exception:\n sys.exit(1)\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  glitchtip-worker:
    image: glitchtip/glitchtip:6.1.6
    restart: unless-stopped
    command: ./bin/run-celery-with-beat.sh
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://glitchtip:${GLITCHTIP_DB_PASSWORD}@postgres:5432/glitchtip
      REDIS_URL: ${GLITCHTIP_REDIS_URL}
      SECRET_KEY: ${GLITCHTIP_SECRET_KEY}
      GLITCHTIP_DOMAIN: https://errors.${DOMAIN}
      EMAIL_URL: ${GLITCHTIP_EMAIL_URL}
      ENABLE_USER_REGISTRATION: "False"
      CELERY_WORKER_AUTOSCALE: "1,3"
      CELERY_WORKER_MAX_TASKS_PER_CHILD: "10000"
    volumes:
      - glitchtip-data:/code/uploads
    networks:
      - net-postgres
      - net-redis

  glitchtip-migrate:
    image: glitchtip/glitchtip:6.1.6
    command: "./manage.py migrate"
    restart: "no"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://glitchtip:${GLITCHTIP_DB_PASSWORD}@postgres:5432/glitchtip
      SECRET_KEY: ${GLITCHTIP_SECRET_KEY}
    networks:
      - net-postgres

  # ─── Monitoring stack ─────────────────────────────────────────────────────
  # Note: runs on core-01 until monitor-01 is provisioned.
  # To migrate: update Alloy endpoint URLs to point to monitor-01.

  victoriametrics:
    image: victoriametrics/victoria-metrics:v1.140.0
    restart: unless-stopped
    volumes:
      - victoriametrics-data:/storage
    command:
      - -storageDataPath=/storage
      - -retentionPeriod=30d
      - -httpListenAddr=:8428
    networks:
      - monitoring
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 4G

  victorialogs:
    image: victoriametrics/victoria-logs:v1.50.0
    restart: unless-stopped
    volumes:
      - victorialogs-data:/vlogs-data
    command:
      - -storageDataPath=/vlogs-data
      - -retentionPeriod=30d
      - -httpListenAddr=:9428
      - -httpAuth.username=${VICTORIALOGS_AUTH_USER}
      - -httpAuth.password=${VICTORIALOGS_AUTH_PASSWORD}
    env_file: .env
    networks:
      - monitoring
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.55.1
    restart: unless-stopped
    privileged: false
    cap_add:
      - SYS_ADMIN
    devices:
      - /dev/kmsg
    security_opt:
      - no-new-privileges:true
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro
    command:
      - -port=8080
      - -docker_only=true
    networks:
      - monitoring

  alloy:
    image: grafana/alloy:v1.15.1
    restart: unless-stopped
    volumes:
      - ./alloy/config.alloy:/etc/alloy/config.alloy:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    command:
      - run
      - --server.http.listen-addr=127.0.0.1:12345
      - /etc/alloy/config.alloy
    user: root   # required for Docker socket + node exporter (prometheus.exporter.unix)
    environment:
      VICTORIALOGS_AUTH_USER: ${VICTORIALOGS_AUTH_USER}
      VICTORIALOGS_AUTH_PASSWORD: ${VICTORIALOGS_AUTH_PASSWORD}
    security_opt:
      - no-new-privileges:true
    depends_on:
      - victoriametrics
      - victorialogs
    networks:
      - klai-net
      - monitoring

  grafana:
    image: grafana/grafana:13.0.1
    restart: unless-stopped
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
    environment:
      GF_SERVER_ROOT_URL: https://grafana.${DOMAIN}
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_AUTH_ANONYMOUS_ENABLED: "false"
      GF_INSTALL_PLUGINS: victoriametrics-logs-datasource
      GRAFANA_POSTGRES_PASSWORD: ${GRAFANA_POSTGRES_PASSWORD}
      # Zitadel OIDC — only users with the grafana_admin project role can log in
      GF_AUTH_GENERIC_OAUTH_ENABLED: "true"
      GF_AUTH_GENERIC_OAUTH_NAME: Klai
      GF_AUTH_GENERIC_OAUTH_CLIENT_ID: "365481665952219144"
      GF_AUTH_GENERIC_OAUTH_SCOPES: "openid email profile urn:zitadel:iam:org:projects:roles"
      GF_AUTH_GENERIC_OAUTH_AUTH_URL: https://auth.getklai.com/oauth/v2/authorize
      GF_AUTH_GENERIC_OAUTH_TOKEN_URL: https://auth.getklai.com/oauth/v2/token
      GF_AUTH_GENERIC_OAUTH_API_URL: https://auth.getklai.com/oidc/v1/userinfo
      GF_AUTH_GENERIC_OAUTH_USE_PKCE: "true"
      GF_AUTH_GENERIC_OAUTH_ROLE_ATTRIBUTE_PATH: "\"urn:zitadel:iam:org:project:roles\".grafana_admin && 'Admin' || ''"
      GF_AUTH_GENERIC_OAUTH_ROLE_ATTRIBUTE_STRICT: "true"
      GF_AUTH_GENERIC_OAUTH_AUTO_LOGIN: "false"
    depends_on:
      - victoriametrics
      - victorialogs
    networks:
      - klai-net
      - monitoring

  # ─── Research: document Q&A service ─────────────────────────────────────

  docling-serve:
    image: ghcr.io/docling-project/docling-serve:v1.16.1
    restart: unless-stopped
    networks:
      - klai-net
    # NOT exposed via Caddy — internal Docker network only

  searxng:
    image: searxng/searxng:2026.4.17-e8299a4c3
    restart: unless-stopped
    environment:
      SEARXNG_SECRET: "${SEARXNG_SECRET}"
    volumes:
      - ./searxng/settings.yml:/etc/searxng/settings.yml:ro
    networks:
      - klai-net
    # NOT exposed via Caddy — internal Docker network only

  research-api:
    image: ghcr.io/getklai/research-api:latest
    restart: unless-stopped
    env_file: .env
    environment:
      POSTGRES_DSN: postgresql+asyncpg://klai:${POSTGRES_PASSWORD}@postgres:5432/klai
      ZITADEL_ISSUER: https://auth.${DOMAIN}
      ZITADEL_API_AUDIENCE: ${RESEARCH_API_ZITADEL_AUDIENCE}
      LITELLM_API_KEY: ${LITELLM_MASTER_KEY}
      VECTOR_BACKEND: qdrant
      QDRANT_URL: http://qdrant:6333
      QDRANT_API_KEY: ${QDRANT_API_KEY}
      RETRIEVAL_API_URL: http://retrieval-api:8040
      DOCLING_URL: http://docling-serve:5001
      TEI_URL: http://172.18.0.1:7997
      LITELLM_URL: http://litellm:4000
      SEARXNG_URL: http://searxng:8080
    volumes:
      - /opt/klai/research-uploads:/opt/klai/research-uploads
    networks:
      - klai-net
      - net-postgres
    depends_on:
      - docling-serve
      - searxng
      - postgres
      - qdrant
      - retrieval-api

  retrieval-api:
    image: ghcr.io/getklai/retrieval-api:latest
    restart: unless-stopped
    env_file: .env
    environment:
      QDRANT_URL: http://qdrant:6333
      QDRANT_API_KEY: ${QDRANT_API_KEY}
      TEI_URL: http://172.18.0.1:7997
      TEI_RERANKER_URL: http://172.18.0.1:7998
      LITELLM_URL: http://litellm:4000
      LITELLM_API_KEY: ${LITELLM_MASTER_KEY}
      FALKORDB_HOST: falkordb
      FALKORDB_PORT: "6379"
      GRAPHITI_ENABLED: "true"
      GRAPH_SEARCH_TIMEOUT: "60.0"
      RERANKER_ENABLED: "true"
      RERANKER_TIMEOUT: "60.0"
      OPENAI_API_KEY: "dummy"
      SPARSE_SIDECAR_URL: http://172.18.0.1:8001
      PORTAL_EVENTS_HOST: postgres
      PORTAL_EVENTS_PASSWORD: ${POSTGRES_PASSWORD}
      # SEC-010 — authentication + rate limiting (SPEC-SEC-010)
      INTERNAL_SECRET: ${RETRIEVAL_API_INTERNAL_SECRET}
      ZITADEL_ISSUER: https://auth.${DOMAIN}
      ZITADEL_API_AUDIENCE: ${RETRIEVAL_API_ZITADEL_AUDIENCE:-}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      RATE_LIMIT_RPM: ${RETRIEVAL_API_RATE_LIMIT_RPM:-600}
    networks:
      - klai-net
      - net-postgres
      - net-redis
    depends_on:
      - qdrant
      - falkordb
      - redis

  # ─── Klai Docs ────────────────────────────────────────────────────────────

  gitea:
    image: gitea/gitea:1.26.0
    restart: unless-stopped
    environment:
      USER_UID: 1000
      USER_GID: 1000
      GITEA__database__DB_TYPE: postgres
      GITEA__database__HOST: postgres:5432
      GITEA__database__NAME: gitea
      GITEA__database__USER: gitea
      GITEA__database__PASSWD: ${GITEA_DB_PASSWORD}
      GITEA__server__DOMAIN: gitea.${DOMAIN}
      GITEA__server__ROOT_URL: http://gitea:3000/
      GITEA__server__HTTP_PORT: "3000"
      GITEA__server__DISABLE_SSH: "true"
      GITEA__service__DISABLE_REGISTRATION: "true"
      GITEA__service__REQUIRE_SIGNIN_VIEW: "false"
      GITEA__security__INSTALL_LOCK: "true"
      GITEA__security__SECRET_KEY: ${GITEA_SECRET_KEY}
      GITEA__security__INTERNAL_TOKEN: ${GITEA_INTERNAL_TOKEN}
      GITEA__log__LEVEL: Warn
    volumes:
      - gitea-data:/data
    networks:
      - klai-net
      - net-postgres
    depends_on:
      postgres:
        condition: service_healthy
    # NOT exposed via Caddy — internal Docker network only

  docs-app:
    image: ghcr.io/getklai/klai-docs:latest
    restart: unless-stopped
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_DATABASE: klai
      POSTGRES_USER: klai
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      GITEA_URL: http://gitea:3000
      GITEA_ADMIN_TOKEN: ${GITEA_ADMIN_TOKEN}
      AUTH_SECRET: ${DOCS_AUTH_SECRET}
      AUTH_TRUST_HOST: "true"
      AUTH_ZITADEL_ISSUER: https://auth.${DOMAIN}
      AUTH_ZITADEL_CLIENT_ID: ${DOCS_ZITADEL_CLIENT_ID}
      AUTH_ZITADEL_CLIENT_SECRET: ${DOCS_ZITADEL_CLIENT_SECRET}
      NEXT_PUBLIC_BASE_DOMAIN: ${DOMAIN}
      CADDY_TENANTS_DIR: /caddy/tenants
      DOCS_INTERNAL_SECRET: ${DOCS_INTERNAL_SECRET}
      KNOWLEDGE_INGEST_URL: http://knowledge-ingest:8000
      KNOWLEDGE_INGEST_SECRET: ${KNOWLEDGE_INGEST_SECRET}
    volumes:
      - caddy-tenants:/caddy/tenants
    networks:
      - klai-net
      - net-postgres
    depends_on:
      - gitea
      - postgres

  # ─── Klai Knowledge MCP ───────────────────────────────────────────────────
  klai-knowledge-mcp:
    image: ghcr.io/getklai/klai-knowledge-mcp:latest
    restart: unless-stopped
    environment:
      KLAI_DOCS_API_BASE: http://docs-app:3010/docs
      DOCS_INTERNAL_SECRET: ${DOCS_INTERNAL_SECRET}
      KNOWLEDGE_INGEST_URL: http://knowledge-ingest:8000
      KNOWLEDGE_INGEST_SECRET: ${KNOWLEDGE_INGEST_SECRET}
      PERSONAL_KB_NAME: personal
      # DEFAULT_ORG_SLUG can be set per-tenant if running a dedicated instance;
      # leave unset when X-Org-Slug is always sent by LibreChat.
    networks:
      - klai-net
    depends_on:
      - docs-app
    # NOT exposed via Caddy — internal Docker network only

  # ─── Scribe: transcription service ───────────────────────────────────────
  scribe-api:
    image: ghcr.io/getklai/scribe-api:latest
    restart: unless-stopped
    env_file: .env
    environment:
      POSTGRES_DSN: postgresql+asyncpg://klai:${POSTGRES_PASSWORD}@postgres:5432/klai
      WHISPER_SERVER_URL: http://172.18.0.1:8000
      ZITADEL_ISSUER: https://auth.${DOMAIN}
    volumes:
      - scribe-audio-data:/data/audio
    networks:
      - klai-net
      - net-postgres
    depends_on:
      - postgres

  # ─── Vexa stack (SPEC-VEXA-003 — upstream main v0.10.x, commit f0756bf) ──
  # Source: https://github.com/Vexa-ai/vexa branch klai/main-260419
  # Build pattern (Phase 6): on core-01 clone fork, run `make build` from
  # deploy/compose/Makefile; images land as vexaai/<svc>:<version>-YYMMDD-HHMM.
  # Tags below are placeholders — Phase 6 rewrites them to real build timestamps.
  # The placeholder form is intentionally rejected by deploy/check-image-tags.sh
  # so this compose file is NOT deploy-ready until Phase 6 completes.

  # ─── Vexa admin-api (management) ────────────────────────────────────────
  admin-api:
    image: vexaai/admin-api:0.10.0-pending
    restart: unless-stopped
    environment:
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_NAME: vexa
      DB_USER: vexa
      DB_PASSWORD: ${VEXA_DB_PASSWORD}
      DB_SSL_MODE: disable
      ADMIN_API_TOKEN: ${VEXA_ADMIN_TOKEN}
      INTERNAL_API_SECRET: ${INTERNAL_API_SECRET}
      LOG_LEVEL: INFO
    init: true
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - klai-net
      - net-postgres
    deploy:
      resources:
        limits:
          memory: 256M
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8001/')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  # ─── Vexa api-gateway (public entry, rate-limited, CORS) ────────────────
  api-gateway:
    image: vexaai/api-gateway:0.10.0-pending
    restart: unless-stopped
    environment:
      ADMIN_API_URL: http://admin-api:8001
      MEETING_API_URL: http://meeting-api:8080
      TRANSCRIPTION_COLLECTOR_URL: http://meeting-api:8080
      MCP_URL: http://mcp:18888                     # harmless when mcp not deployed
      CALENDAR_SERVICE_URL: http://calendar-service:8050   # unused in v1
      AGENT_API_URL: http://agent-api:8100          # unused in v1
      REDIS_URL: redis://:${VEXA_REDIS_PASSWORD}@vexa-redis:6379/0
      INTERNAL_API_SECRET: ${INTERNAL_API_SECRET}
      RATE_LIMIT_RPM: "120"
      LOG_LEVEL: INFO
      CORS_ORIGINS: "*"
    init: true
    depends_on:
      admin-api:
        condition: service_healthy
      meeting-api:
        condition: service_started
    networks:
      - klai-net
      - vexa-bots   # needed to reach vexa-redis
    deploy:
      resources:
        limits:
          memory: 1G

  # ─── Vexa meeting-api (bot lifecycle, transcription collector) ──────────
  # Network alias `vexa-meeting-api` retained for portal-api backwards compat
  # (REQ-E-001, REQ-U-001 — no config churn in portal-api during this migration).
  meeting-api:
    image: vexaai/meeting-api:0.10.0-pending
    restart: unless-stopped
    environment:
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_NAME: vexa
      DB_USER: vexa
      DB_PASSWORD: ${VEXA_DB_PASSWORD}
      DB_SSL_MODE: disable
      REDIS_URL: redis://:${VEXA_REDIS_PASSWORD}@vexa-redis:6379/0
      REDIS_HOST: vexa-redis
      REDIS_PORT: "6379"
      ADMIN_TOKEN: ${VEXA_ADMIN_TOKEN}
      RUNTIME_API_URL: http://runtime-api:8090
      RUNTIME_API_TOKEN: ${BOT_API_TOKEN}
      MEETING_API_URL: http://meeting-api:8080
      BOT_IMAGE_NAME: vexaai/vexa-bot:0.10.0-pending
      DOCKER_NETWORK: vexa-bots
      TRANSCRIPTION_COLLECTOR_URL: http://meeting-api:8080
      # Storage backend: Garage speaks S3, so minio-* vars point at Garage.
      # RECORDING_ENABLED=false (REQ-U-001 GDPR) — S3 path is unused but config
      # is required so the service can boot. See SPEC-VEXA-003 research.md §5.1.
      STORAGE_BACKEND: minio
      MINIO_ENDPOINT: garage:3900
      MINIO_ACCESS_KEY: ${GARAGE_ACCESS_KEY}
      MINIO_SECRET_KEY: ${GARAGE_SECRET_KEY}
      MINIO_BUCKET: vexa-recordings
      MINIO_SECURE: "false"
      RECORDING_ENABLED: "false"
      CAPTURE_MODES: "audio"
      TRANSCRIPTION_SERVICE_URL: http://172.18.0.1:8000/v1/audio/transcriptions
      TRANSCRIPTION_SERVICE_TOKEN: internal
      POST_MEETING_HOOKS: http://portal-api:8010/api/bots/internal/webhook
      LOG_LEVEL: INFO
    init: true
    depends_on:
      postgres:
        condition: service_healthy
      vexa-redis:
        condition: service_healthy
      runtime-api:
        condition: service_started
    networks:
      klai-net:
        aliases:
          - vexa-meeting-api   # backwards-compat alias — portal-api config unchanged
      net-postgres: {}
      vexa-bots: {}
    deploy:
      resources:
        limits:
          memory: 1G
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # ─── Vexa runtime-api (Docker-socket bot orchestrator) ──────────────────
  runtime-api:
    image: vexaai/runtime-api:0.10.0-pending
    restart: unless-stopped
    environment:
      DOCKER_NETWORK: vexa-bots
      BROWSER_IMAGE: vexaai/vexa-bot:0.10.0-pending
      AGENT_IMAGE: ""                              # agent profile not shipped in v1
      REDIS_URL: redis://:${VEXA_REDIS_PASSWORD}@vexa-redis:6379/0
      MINIO_ENDPOINT: garage:3900
      MINIO_ACCESS_KEY: ${GARAGE_ACCESS_KEY}
      MINIO_SECRET_KEY: ${GARAGE_SECRET_KEY}
      MINIO_BUCKET: vexa-recordings
      BOT_API_TOKEN: ${BOT_API_TOKEN}
      API_KEYS: ${BOT_API_TOKEN}
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_NAME: vexa
      DB_USER: vexa
      DB_PASSWORD: ${VEXA_DB_PASSWORD}
      DB_SSL_MODE: disable
      PROFILES_PATH: /app/profiles.yaml
      ALLOW_PRIVATE_CALLBACKS: "1"
      LOG_LEVEL: INFO
    group_add:
      - "988"   # docker GID on core-01 — required for socket access
    volumes:
      - ./vexa/profiles.yaml:/app/profiles.yaml:ro
      - /var/run/docker.sock:/var/run/docker.sock
    init: true
    depends_on:
      vexa-redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    networks:
      - vexa-bots
      - net-postgres
    deploy:
      resources:
        limits:
          memory: 256M
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8090/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # ─── Vexa Redis (bot state, pub/sub, streams) ───────────────────────────
  # REQ-U-006: redis:8-alpine (same major as klai main redis). Upstream vexa
  # pins redis:7.0-alpine but we do NOT downgrade if the new version works.
  # Phase 7.7 runs the forward-compat battery (pub/sub, streams, consumer
  # groups); if any fails, rollback to `redis:7.0-alpine` is a single image
  # line change. See research.md §5.3 and acceptance.md §N.
  vexa-redis:
    image: redis:8-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes", "--requirepass", "${VEXA_REDIS_PASSWORD}", "--appendfsync", "everysec"]
    deploy:
      resources:
        limits:
          memory: 256M
    networks:
      - vexa-bots   # isolated from klai-net-redis; bot containers resolve vexa-redis via this network
      - net-redis   # api-gateway reads the shared broker from klai net-redis
    volumes:
      - vexa-redis-data:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a $VEXA_REDIS_PASSWORD --no-auth-warning ping | grep PONG"]
      interval: 10s
      timeout: 5s
      retries: 3

  # ─── Qdrant (vector store for Klai Knowledge) ────────────────────────────
  qdrant:
    image: qdrant/qdrant:v1.17.1
    restart: unless-stopped
    volumes:
      - qdrant-data:/qdrant/storage
    environment:
      QDRANT__SERVICE__API_KEY: ${QDRANT_API_KEY}
    networks:
      - klai-net
    # NOT exposed via Caddy — internal Docker network only
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 4G

  # ─── FalkorDB (knowledge graph for Graphiti) ─────────────────────────────
  falkordb:
    image: falkordb/falkordb:v4.18.1
    restart: unless-stopped
    ports:
      - "127.0.0.1:6380:6379"
    volumes:
      - /opt/klai/falkordb-data:/data
    networks:
      - klai-net

  # ─── Knowledge Ingest (RAG ingestion + retrieval for LiteLLM hook) ──────────
  knowledge-ingest:
    image: ghcr.io/getklai/knowledge-ingest:latest
    restart: unless-stopped
    environment:
      POSTGRES_DSN: postgresql+asyncpg://klai:${POSTGRES_PASSWORD}@postgres:5432/klai
      QDRANT_URL: http://qdrant:6333
      QDRANT_API_KEY: ${QDRANT_API_KEY}
      TEI_URL: http://172.18.0.1:7997
      SPARSE_SIDECAR_URL: http://172.18.0.1:8001
      # BGE-M3 sparse sidecar on GPU (~100ms/batch). Generous timeout as safety margin.
      SPARSE_SIDECAR_TIMEOUT: "30"
      GITEA_URL: http://gitea:3000
      GITEA_TOKEN: ${GITEA_ADMIN_TOKEN}
      DOCS_INTERNAL_SECRET: ${DOCS_INTERNAL_SECRET}
      KNOWLEDGE_INGEST_SECRET: ${KNOWLEDGE_INGEST_SECRET}
      GITEA_WEBHOOK_SECRET: ${GITEA_WEBHOOK_SECRET}
      LITELLM_URL: http://litellm:4000
      LITELLM_API_KEY: ${LITELLM_MASTER_KEY}
      FALKORDB_HOST: falkordb
      FALKORDB_PORT: "6379"
      GRAPHITI_ENABLED: "true"
      PORTAL_URL: http://portal-api:8010
      PORTAL_INTERNAL_TOKEN: ${PORTAL_API_INTERNAL_SECRET}
    networks:
      - klai-net
      - net-postgres
    depends_on:
      - qdrant
      - postgres
      - falkordb

  # ─── Garage S3 (image storage for knowledge pipeline) ────────────────────────
  # Garage serves images via two endpoints:
  #   - S3 API on :3900 (authenticated uploads from klai-connector)
  #   - Web endpoint on :3902 (anonymous reads via Caddy /kb-images/ route)
  garage:
    image: dxflrs/garage:v2.3.0
    restart: unless-stopped
    volumes:
      - /opt/klai/garage-meta:/var/lib/garage/meta
      - /opt/klai/garage-data:/var/lib/garage/data
      - /opt/klai/garage/garage.toml:/etc/garage.toml:ro
    environment:
      GARAGE_RPC_SECRET: ${GARAGE_RPC_SECRET}
      GARAGE_ADMIN_TOKEN: ${GARAGE_ADMIN_TOKEN}
    networks:
      - klai-net
    healthcheck:
      test: ["CMD", "/garage", "status"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1G

  # ─── Klai Connector (external source sync to knowledge layer) ───────────────
  klai-connector:
    image: ghcr.io/getklai/klai-connector:latest
    restart: unless-stopped
    env_file: ./klai-connector/.env
    environment:
      DATABASE_URL: postgresql+asyncpg://klai:${POSTGRES_PASSWORD}@postgres:5432/klai
      ZITADEL_INTROSPECTION_URL: https://auth.${DOMAIN}/oauth/v2/introspect
      KNOWLEDGE_INGEST_URL: http://knowledge-ingest:8000
      KNOWLEDGE_INGEST_SECRET: ${KNOWLEDGE_INGEST_SECRET}
      CRAWL4AI_API_URL: http://crawl4ai:11235
      CRAWL4AI_INTERNAL_KEY: ${CRAWL4AI_INTERNAL_KEY}
      PORTAL_API_URL: http://portal-api:8010
      PORTAL_CALLER_SECRET: ${PORTAL_API_KLAI_CONNECTOR_SECRET}
      PORTAL_INTERNAL_SECRET: ${PORTAL_API_INTERNAL_SECRET}
      GARAGE_S3_ENDPOINT: garage:3900
      GARAGE_ACCESS_KEY: ${GARAGE_ACCESS_KEY}
      GARAGE_SECRET_KEY: ${GARAGE_SECRET_KEY}
      GARAGE_BUCKET: ${GARAGE_BUCKET:-klai-images}
      GARAGE_REGION: garage
      LOG_LEVEL: INFO
    networks:
      - klai-net
      - net-postgres
    depends_on:
      postgres:
        condition: service_healthy
      knowledge-ingest:
        condition: service_started
      garage:
        condition: service_healthy

  # ─── Crawl4AI (internal web crawler for klai-connector) ─────────────────────
  crawl4ai:
    image: unclecode/crawl4ai:0.8.6
    restart: unless-stopped
    environment:
      CRAWL4AI_API_TOKEN: ${CRAWL4AI_INTERNAL_KEY}
      CRAWL4AI_HOOKS_ENABLED: "true"
    networks:
      - klai-net
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G

  # ─── Web search stack (LibreChat web mode) ───────────────────────────────────

  # Firecrawl v1.x: self-hosted web scraper for LibreChat full-page content extraction.
  # Requires dedicated Postgres (NUQ job queue) and RabbitMQ (worker coordination).
  # NUQ schema is auto-initialized via firecrawl-nuq-init.sql on first Postgres start.
  # Redis URL must use %-encoded password (special chars break ioredis URL parsing).
  # Image built from source — ghcr.io/mendableai/firecrawl is a private registry.
  # Build: cd /tmp/firecrawl/apps/api && docker build -t ghcr.io/mendableai/firecrawl:latest .
  firecrawl-postgres:
    image: postgres:18-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: firecrawl
      POSTGRES_PASSWORD: ${FIRECRAWL_DB_PASSWORD}
      POSTGRES_DB: firecrawl
    networks:
      - klai-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U firecrawl -d firecrawl"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    volumes:
      - firecrawl-postgres-data:/var/lib/postgresql/data
      - ./firecrawl-nuq-init.sql:/docker-entrypoint-initdb.d/nuq-schema.sql:ro

  firecrawl-rabbitmq:
    image: rabbitmq:3-alpine
    restart: unless-stopped
    networks:
      - klai-net
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "check_running"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s

  firecrawl-api:
    image: ghcr.io/mendableai/firecrawl:latest
    restart: unless-stopped
    environment:
      PORT: "3002"
      HOST: "0.0.0.0"
      # Redis password contains special chars — must be %-encoded in the URL.
      # Plain ${REDIS_PASSWORD} substitution breaks ioredis URL parsing (falls back to 127.0.0.1).
      REDIS_URL: "${FIRECRAWL_REDIS_URL}"
      REDIS_RATE_LIMIT_URL: "${FIRECRAWL_REDIS_URL}"
      USE_DB_AUTHENTICATION: "false"
      FIRECRAWL_API_KEY: "${FIRECRAWL_INTERNAL_KEY}"
      NUM_WORKERS_PER_QUEUE: "2"
      LOGGING_LEVEL: "INFO"
      NUQ_DATABASE_URL: "postgresql://firecrawl:${FIRECRAWL_DB_PASSWORD}@firecrawl-postgres:5432/firecrawl"
      NUQ_RABBITMQ_URL: "amqp://firecrawl-rabbitmq:5672"
    networks:
      - klai-net
      - net-redis
    depends_on:
      redis:
        condition: service_healthy
      firecrawl-postgres:
        condition: service_healthy
      firecrawl-rabbitmq:
        condition: service_healthy
    # NOT exposed via Caddy — internal Docker network only
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 1G
