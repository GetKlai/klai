version: 1.3.8

cache: true

registration:
  socialLogins: []

# ── Interface ────────────────────────────────────────────────────────────────
# Stripped-down UI for Klai tenants. Everything non-essential is disabled at
# config level so new users start with the minimum surface area. Keep the list
# exhaustive — missing keys fall back to LibreChat defaults (usually `true`),
# and v0.8.5 has added keys that re-enabled surfaces we intentionally hid in
# earlier versions (parameters, endpointsMenu, temporaryChat, peoplePicker,
# fileCitations, marketplace, sidePanel).
#
# Reference: https://www.librechat.ai/docs/configuration/librechat_yaml/object_structure/interface
interface:
  # Enabled surfaces
  webSearch: true
  mcpServers:
    use: true
    create: false
    share: false

  # Disabled surfaces — keep in this list even if the key appeared in a later
  # LibreChat version; explicit false survives schema evolutions.
  agents:
    use: false
    create: false
    share: false
  remoteAgents: false
  prompts:
    use: false
    create: false
    share: false
  peoplePicker:
    users: false
    groups: false
    roles: false
  marketplace:
    use: false
  memories: false
  bookmarks: false
  multiConvo: false
  presets: false
  fileSearch: false
  fileCitations: false
  runCode: false
  modelSelect: false
  endpointsMenu: false
  parameters: false
  sidePanel: false
  temporaryChat: false
  artifacts: false

balance:
  enabled: false

# ── Web search ────────────────────────────────────────────────────────────────
# Search:   SearXNG (self-hosted, klai-net) — Startpage + DuckDuckGo engines
# Scraper:  firecrawl-api (self-hosted, klai-net) — full-page content extraction
# Reranker: Infinity (gpu-01 via SSH tunnel at 172.18.0.1:7998) — bge-reranker-v2-m3 (GPU)
#           Exposed as Jina-compatible /v1/rerank; no auth needed (network-isolated)
webSearch:
  searchProvider: "searxng"
  searxngInstanceUrl: "${SEARXNG_INSTANCE_URL}"
  scraperProvider: "firecrawl"
  firecrawlApiKey: "${FIRECRAWL_API_KEY}"
  firecrawlApiUrl: "${FIRECRAWL_API_URL}"
  rerankerType: "jina"
  jinaApiKey: "${JINA_API_KEY}"
  jinaApiUrl: "${JINA_API_URL}"
  firecrawlOptions:
    onlyMainContent: true
    formats:
      - markdown

# ── Klai Knowledge MCP ────────────────────────────────────────────────────────
# Exposes save_to_personal_kb to LibreChat agents.
# X-Org-Slug is per-tenant: set KLAI_ORG_SLUG in the tenant's .env and replace
# the placeholder below. One librechat.yaml per tenant is the current pattern.
mcpServers:
  klai-knowledge:
    type: streamable-http
    url: http://klai-knowledge-mcp:8080/mcp
    headers:
      X-User-ID: "{{LIBRECHAT_USER_ID}}"
      X-Org-ID: "${KLAI_ZITADEL_ORG_ID}"
      X-Org-Slug: "${KLAI_ORG_SLUG}"
      X-Internal-Secret: "${KNOWLEDGE_INGEST_SECRET}"

mcpSettings:
  allowedDomains:
    - http://klai-knowledge-mcp:8080

# Disable built-in endpoints; all AI goes through LiteLLM
endpoints:
  openAI:
    disabled: true
  assistants:
    disabled: true
  google:
    disabled: true
  anthropic:
    disabled: true
  custom:
    - name: "Klai AI"
      apiKey: "${LITELLM_API_KEY}"
      baseURL: "http://litellm:4000/v1"
      models:
        default:
          - klai-primary
        fetch: false
      titleConvo: true
      titleModel: "klai-primary"
      summarize: false
      summaryModel: "klai-primary"
      forcePrompt: false
      modelDisplayLabel: "Klai AI"

modelSpecs:
  prioritize: true
  list:
    - name: "klai-primary"
      mcpServers:
        - "klai-knowledge"
      label: "Klai AI"
      default: true
      preset:
        endpoint: "Klai AI"
        model: "klai-primary"
        promptPrefix: >
          You are a helpful AI assistant.
          When answering questions that required a web search, be concise:
          summarize the key findings in clear, direct language and cite only
          the most relevant sources. Do not repeat information across sources
          unless they add distinct value.
