# Garage S3-compatible object storage — single-node configuration.
# Docs: https://garagehq.deuxfleurs.fr/documentation/reference-manual/configuration/
#
# Secrets (rpc_secret, admin_token) are injected via environment variables:
#   GARAGE_RPC_SECRET — 32-byte hex string (openssl rand -hex 32)
#   GARAGE_ADMIN_TOKEN — admin API bearer token
# This avoids secrets in config files and works with SOPS + Docker Compose.

metadata_dir = "/var/lib/garage/meta"
data_dir = "/var/lib/garage/data"
db_engine = "lmdb"

replication_factor = 1

rpc_bind_addr = "[::]:3901"
rpc_public_addr = "127.0.0.1:3901"

[s3_api]
s3_region = "garage"
api_bind_addr = "[::]:3900"

[s3_web]
bind_addr = "[::]:3902"
root_domain = ".web.garage"

[admin]
api_bind_addr = "[::]:3903"
