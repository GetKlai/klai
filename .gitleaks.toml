# Gitleaks configuration for the Klai monorepo
title = "klai gitleaks config"

[allowlist]
description = "Allowlist for known false positives and test fixtures"
regexes = [
    # JWT header prefix — not a secret, just {"alg":"RS256","typ":"JWT"} base64
    '''eyJhbGciOiJSUzI1NiIsInR5cCI6IkpXVCJ9''',
    # Fake Stripe test key from MoAI skills examples (sequential digits, placeholder)
    '''sk_live_1234567890abcdefghij''',
    # URL query parameter, not a token
    '''phase=silent-renew''',
    # Docker image tag
    '''0\.10\.0-260419-1530-klai''',
    # presigned_url= variable name match
    '''presigned_url=''',
]
paths = [
    # Python virtual environments — contain test fixtures from third-party packages
    '''.venv''',
    # Orphaned agent worktrees (cleaned up separately via git worktree prune)
    '''.claude/worktrees''',
]

