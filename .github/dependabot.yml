version: 2
updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly

  - package-ecosystem: npm
    directory: /portal/frontend
    schedule:
      interval: weekly

  - package-ecosystem: pip
    directory: /portal/backend
    schedule:
      interval: weekly

  - package-ecosystem: pip
    directory: /focus/research-api
    schedule:
      interval: weekly

  - package-ecosystem: pip
    directory: /scribe/scribe-api
    schedule:
      interval: weekly

  - package-ecosystem: pip
    directory: /retrieval-api
    schedule:
      interval: weekly

  - package-ecosystem: pip
    directory: /deploy/knowledge-ingest
    schedule:
      interval: weekly

  - package-ecosystem: pip
    directory: /deploy/klai-knowledge-mcp
    schedule:
      interval: weekly

  - package-ecosystem: npm
    directory: /docs
    schedule:
      interval: weekly

  - package-ecosystem: docker
    directory: /deploy
    schedule:
      interval: weekly

# CVE exceptions — reference GitHub issues for traceability
# Each ignored vulnerability must have a corresponding GitHub issue with:
# - reason for ignoring
# - compensating controls in place
# - re-assessment date
#
# CVE-2026-4539: see https://github.com/GetKlai/klai/issues/62
# Not directly exploitable in Klai's context; re-assess Q3 2026
ignore: []
