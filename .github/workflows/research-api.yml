name: Build and push research-api

on:
  push:
    branches: [main]
    paths:
      - 'focus/research-api/**'
      - '.github/workflows/research-api.yml'

permissions:
  contents: read
  packages: write

jobs:
  build-push:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push research-api
        uses: docker/build-push-action@v6
        with:
          context: ./focus/research-api
          push: true
          tags: |
            ghcr.io/getklai/research-api:latest
            ghcr.io/getklai/research-api:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy to core-01
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.CORE01_HOST }}
          username: klai
          key: ${{ secrets.CORE01_DEPLOY_KEY }}
          script: |
            docker pull ghcr.io/getklai/research-api:latest
            cd /opt/klai && docker compose up -d research-api
