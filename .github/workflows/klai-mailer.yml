name: Build and push klai-mailer

on:
  push:
    branches: [main]
    paths:
      - 'deploy/klai-mailer/**'
      - '.github/workflows/klai-mailer.yml'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build-push:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and push klai-mailer
        uses: docker/build-push-action@v7
        with:
          context: ./deploy/klai-mailer
          push: true
          tags: |
            ghcr.io/getklai/klai-mailer:latest
            ghcr.io/getklai/klai-mailer:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy to core-01
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.CORE01_HOST }}
          username: klai
          key: ${{ secrets.CORE01_DEPLOY_KEY }}
          script: |
            set -e
            source /opt/klai/.env
            echo "$GHCR_READ_PAT" | docker login ghcr.io -u mvletter --password-stdin
            docker pull ghcr.io/getklai/klai-mailer:latest
            cd /opt/klai && docker compose up -d klai-mailer
