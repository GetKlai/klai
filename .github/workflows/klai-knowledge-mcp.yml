name: Build and push klai-knowledge-mcp

on:
  push:
    branches: [main]
    paths:
      - 'klai-knowledge-mcp/**'
      # SPEC-SEC-IDENTITY-ASSERT-001 Phase B: knowledge-mcp consumes
      # klai-libs/identity-assert as a path-dep, so library changes need
      # to retrigger this image build.
      - 'klai-libs/identity-assert/**'
      - '.github/workflows/klai-knowledge-mcp.yml'
  pull_request:
    branches: [main]
    paths:
      - 'klai-knowledge-mcp/**'
      - 'klai-libs/identity-assert/**'
      - '.github/workflows/klai-knowledge-mcp.yml'
  workflow_dispatch:

permissions:
  contents: read
  packages: write
  security-events: write

env:
  # Opt in early to Node 24 for all JS-based actions (Node 20 EOL Sept 2026)
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build-push:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      # SPEC-SEC-CORS-001 REQ-6 — CORSMiddleware must be the LAST add_middleware
      # call in this service's entry module. Rule lives at
      # rules/cors_middleware_last.yml, configured by sgconfig.yml at repo root.
      # `uses:` steps ignore the job's defaults.run.working-directory and run
      # from $GITHUB_WORKSPACE, so the relative paths resolve correctly.
      # Note: klai-knowledge-mcp uses FastMCP streamable_http_app() which has no
      # add_middleware calls — this step is a vacuous-pass per REQ-6.3 note.
      - name: Guard — CORSMiddleware must be last (SPEC-SEC-CORS-001 REQ-6)
        uses: ast-grep/action@cf62e780f0c88301228978d593a7784427a097a6  # v1.5.0
        with:
          config: sgconfig.yml
          paths: klai-knowledge-mcp/main.py

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and push klai-knowledge-mcp
        uses: docker/build-push-action@v7
        with:
          # SPEC-SEC-IDENTITY-ASSERT-001 Phase B: build context is the repo
          # root so klai-libs/identity-assert is reachable as a Docker COPY
          # source. Same pattern as klai-knowledge-ingest.
          context: .
          file: klai-knowledge-mcp/Dockerfile
          push: ${{ github.event_name == 'push' }}
          tags: |
            ghcr.io/getklai/klai-knowledge-mcp:latest
            ghcr.io/getklai/klai-knowledge-mcp:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy to core-01
        if: github.event_name == 'push'
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.CORE01_HOST }}
          username: klai
          key: ${{ secrets.CORE01_DEPLOY_KEY }}
          script: |
            set -e
            source /opt/klai/.env
            echo "$GHCR_READ_PAT" | docker login ghcr.io -u mvletter --password-stdin
            docker pull ghcr.io/getklai/klai-knowledge-mcp:latest
            cd /opt/klai && docker compose up -d klai-knowledge-mcp

  scan:
    needs: build-push
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      packages: read
    steps:
      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@0.35.0
        with:
          image-ref: ghcr.io/getklai/klai-knowledge-mcp:${{ github.sha }}
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH'
          ignore-unfixed: true
          exit-code: '0'

      - name: Upload Trivy SARIF to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'
