name: Renovate

on:
  schedule:
    - cron: '0 5 * * 1'  # Monday 05:00 Amsterdam time
  workflow_dispatch:

jobs:
  renovate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: renovatebot/github-action@v46
        with:
          token: ${{ secrets.GITHUB_ADMIN_PAT }}
