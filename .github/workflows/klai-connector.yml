name: Build and push klai-connector

on:
  push:
    branches: [main]
    paths:
      - 'klai-connector/**'
      - 'klai-libs/connector-credentials/**'
      - 'klai-libs/image-storage/**'
      - '.github/workflows/klai-connector.yml'
  pull_request:
    branches: [main]
    paths:
      - 'klai-connector/**'
      - 'klai-libs/connector-credentials/**'
      - 'klai-libs/image-storage/**'
      - '.github/workflows/klai-connector.yml'
  workflow_dispatch:

permissions:
  contents: read
  packages: write
  security-events: write

env:
  # Opt in early to Node 24 for all JS-based actions (Node 20 EOL Sept 2026)
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  # SPEC-SEC-HYGIENE-001 REQ-30.3 — ruff F821 (and the rest of the
  # configured rule set) MUST run on klai-connector code so a future
  # NameError landmine like the original HY-30 bug fails CI. The
  # build-push job below depends on quality, so a lint failure blocks
  # the deploy. Mirrors the pattern in portal-api.yml.
  quality:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: klai-connector

    steps:
      - uses: actions/checkout@v6

      - uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync --group dev

      - name: Lint (ruff)
        run: uv run ruff check .

      # NOTE: `ruff format --check` is intentionally NOT enforced yet —
      # the connector has never been ruff-formatted (~36 files would
      # change). Add it once a separate format-the-world PR lands.

  build-push:
    runs-on: ubuntu-latest
    needs: quality

    steps:
      - uses: actions/checkout@v6

      # SPEC-SEC-CORS-001 REQ-6 — CORSMiddleware must be the LAST add_middleware
      # call in this service's entry module. Rule lives at
      # rules/cors_middleware_last.yml, configured by sgconfig.yml at repo root.
      # `uses:` steps ignore the job's defaults.run.working-directory and run
      # from $GITHUB_WORKSPACE, so the relative paths resolve correctly.
      - name: Guard — CORSMiddleware must be last (SPEC-SEC-CORS-001 REQ-6)
        uses: ast-grep/action@cf62e780f0c88301228978d593a7784427a097a6  # v1.5.0
        with:
          config: sgconfig.yml
          paths: klai-connector/app/main.py

      # SPEC-SEC-INTERNAL-001 REQ-6: ban `==` / `!=` on secret-shaped variables
      # across the whole klai-connector app tree.
      - name: Guard — no string-compare on secret (SPEC-SEC-INTERNAL-001 REQ-6)
        uses: ast-grep/action@cf62e780f0c88301228978d593a7784427a097a6  # v1.5.0
        with:
          config: sgconfig.yml
          paths: klai-connector/app

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and push klai-connector
        uses: docker/build-push-action@v7
        with:
          # SPEC-CRAWLER-004 Fase 0: build from repo root so the Dockerfile can
          # COPY the shared klai-libs/connector-credentials path dep.
          context: .
          file: klai-connector/Dockerfile
          push: true
          tags: |
            ghcr.io/getklai/klai-connector:${{ github.sha }}
            ${{ github.event_name == 'push' && 'ghcr.io/getklai/klai-connector:latest' || '' }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # SPEC-CONNECTOR-DELETE-LIFECYCLE-001 PR C lesson: an earlier version of
      # this workflow ran the deploy step on every ``pull_request`` build,
      # auto-publishing PR-build images to prod under the ``:latest`` tag and
      # triggering a docker compose up -d on core-01. That dropped a broken
      # (varchar(32)-overflow) alembic migration into prod from a PR that was
      # never reviewed. The ``if`` condition below pins the deploy to
      # main-branch pushes only — PRs build + scan but do not deploy.
      - name: Deploy to core-01
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.CORE01_HOST }}
          username: klai
          key: ${{ secrets.CORE01_DEPLOY_KEY }}
          script: |
            set -e
            source /opt/klai/.env
            echo "$GHCR_READ_PAT" | docker login ghcr.io -u mvletter --password-stdin
            docker pull ghcr.io/getklai/klai-connector:latest
            cd /opt/klai && docker compose up -d klai-connector

  scan:
    needs: build-push
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      packages: read
    steps:
      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@0.35.0
        with:
          image-ref: ghcr.io/getklai/klai-connector:${{ github.sha }}
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH'
          ignore-unfixed: true
          exit-code: '0'

      - name: Upload Trivy SARIF to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'
