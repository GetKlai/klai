name: SAST — Semgrep

on:
  push:
    branches: [main]
    paths:
      - 'klai-portal/backend/**'
      - 'klai-portal/frontend/**'
      - '.github/workflows/semgrep.yml'
  pull_request:
    branches: [main]
    paths:
      - 'klai-portal/backend/**'
      - 'klai-portal/frontend/**'

permissions:
  contents: read
  security-events: write

jobs:
  semgrep:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: SAST scan (Semgrep)
        uses: semgrep/semgrep-action@v1
        with:
          config: >-
            auto
            p/owasp-top-ten
        env:
          # No SEMGREP_APP_TOKEN needed for OSS rules
          SEMGREP_APP_TOKEN: ""
