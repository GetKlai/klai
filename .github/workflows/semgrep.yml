name: SAST — Semgrep

on:
  push:
    branches: [main]
    paths:
      - 'klai-portal/backend/**'
      - 'klai-portal/frontend/**'
      - 'klai-connector/**'
      - 'klai-focus/**'
      - 'klai-knowledge-ingest/**'
      - 'klai-knowledge-mcp/**'
      - 'klai-mailer/**'
      - 'klai-retrieval-api/**'
      - 'klai-scribe/**'
      - 'deploy/litellm/**'
      - '.github/workflows/semgrep.yml'
  pull_request:
    branches: [main]
    paths:
      - 'klai-portal/backend/**'
      - 'klai-portal/frontend/**'
      - 'klai-connector/**'
      - 'klai-focus/**'
      - 'klai-knowledge-ingest/**'
      - 'klai-knowledge-mcp/**'
      - 'klai-mailer/**'
      - 'klai-retrieval-api/**'
      - 'klai-scribe/**'
      - 'deploy/litellm/**'

permissions:
  contents: read

env:
  # Opt in early to Node 24 for all JS-based actions (Node 20 EOL Sept 2026)
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  semgrep:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Semgrep
        run: pip install semgrep

      - name: SAST scan (Semgrep — local, no cloud)
        run: |
          semgrep scan \
            --config auto \
            --config p/owasp-top-ten \
            --exclude 'klai-portal/frontend/public/widget/*.js' \
            klai-portal/backend \
            klai-portal/frontend \
            klai-connector \
            klai-focus \
            klai-knowledge-ingest/knowledge_ingest \
            klai-knowledge-mcp \
            klai-mailer \
            klai-retrieval-api \
            klai-scribe \
            deploy/litellm \
            --error
