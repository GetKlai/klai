name: Build and push caddy-hetzner

on:
  push:
    branches: [main]
    paths:
      - 'deploy/caddy/**'
      - '.github/workflows/caddy.yml'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build-push:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and push caddy-hetzner
        uses: docker/build-push-action@v7
        with:
          context: ./deploy/caddy
          push: true
          tags: |
            ghcr.io/getklai/caddy-hetzner:latest
            ghcr.io/getklai/caddy-hetzner:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy to core-01
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.CORE01_HOST }}
          username: klai
          key: ${{ secrets.CORE01_DEPLOY_KEY }}
          script: |
            docker pull ghcr.io/getklai/caddy-hetzner:latest
            cd /opt/klai && docker compose up -d caddy
