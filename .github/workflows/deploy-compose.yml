name: Sync docker-compose.yml + config + smoke-test to core-01

on:
  push:
    branches: [main]
    paths:
      - 'deploy/docker-compose.yml'
      - 'deploy/docker-compose.override.yml'
      - 'deploy/grafana/provisioning/**'          # SPEC-SEC-024 M4.2 — alert rule + dashboard
      - 'scripts/smoke-docker-socket-proxy.sh'    # SPEC-SEC-024 M4.3 — smoke-test
      - '.github/workflows/deploy-compose.yml'
  workflow_dispatch:

permissions:
  contents: read

env:
  # Opt in early to Node 24 for all JS-based actions (Node 20 EOL Sept 2026)
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  sync-compose:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Sync docker-compose.yml + config + run smoke-test
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.CORE01_HOST }}
          username: klai
          key: ${{ secrets.CORE01_DEPLOY_KEY }}
          script: |
            set -e
            cd /tmp && rm -rf klai-compose-sync
            git clone --depth=1 --filter=blob:none --sparse \
              https://github.com/GetKlai/klai.git klai-compose-sync
            cd klai-compose-sync
            # SPEC-SEC-024 M4.2 + M4.3: also pull grafana/provisioning + scripts/
            # so Grafana picks up the new alert rule and the smoke-test reaches
            # core-01. Matches how deploy/caddy and deploy/alloy live in the
            # repo — config travels with compose.
            git sparse-checkout set --skip-checks \
              deploy/docker-compose.yml \
              deploy/docker-compose.override.yml \
              deploy/grafana/provisioning \
              scripts
            cp deploy/docker-compose.yml /opt/klai/docker-compose.yml
            cp deploy/docker-compose.override.yml /opt/klai/docker-compose.override.yml

            # SPEC-SEC-024 M4.2 — sync Grafana provisioning. Grafana loads
            # provisioning only at startup, so we need to restart when files
            # change. Use `up -d` instead of `restart`: `restart` keeps the
            # existing container env (docker-compose.yml + .env changes are
            # ignored), while `up -d` recreates the container with fresh env
            # if the compose file or .env drifted. Required for env-var
            # changes to grafana (e.g. VICTORIALOGS_AUTH_*, GF_SMTP_*).
            #
            # SPEC-OBS-001 Phase C — bind-mount-only changes detection.
            # `up -d` is a no-op when bind-mount source content changes but
            # the service definition (image, env, ports) is unchanged. Pure
            # provisioning-file edits (new alert rule YAML, dashboard JSON)
            # therefore land on disk but Grafana keeps running with the old
            # config until something else triggers a recreate. We capture
            # rsync's content-based diff (`-c` checksums, ignoring mtime
            # churn from the fresh git clone) and only force-recreate when
            # files actually changed. Falls back to plain `up -d` for the
            # service-definition path so env-var changes still recreate
            # naturally. Short downtime (~10s) is acceptable for an internal
            # observability tool; no user-facing impact.
            mkdir -p /opt/klai/grafana/provisioning
            RSYNC_PROV_CHANGES=$(rsync -ac --itemize-changes deploy/grafana/provisioning/ /opt/klai/grafana/provisioning/ | grep -E '^[<>*]' || true)
            if [ -n "$RSYNC_PROV_CHANGES" ]; then
              echo "Grafana provisioning content changed:"
              echo "$RSYNC_PROV_CHANGES"
              docker compose --project-directory /opt/klai up -d --force-recreate grafana
            else
              echo "Grafana provisioning unchanged; using plain up -d (recreates only on service-definition diff)"
              docker compose --project-directory /opt/klai up -d grafana
            fi

            # SPEC-SEC-024 M4.3 — sync smoke-test script. `chmod +x` because
            # git clone on a Linux runner usually preserves the execute bit,
            # but this guards against core.filemode quirks.
            mkdir -p /opt/klai/scripts
            rsync -a scripts/smoke-docker-socket-proxy.sh /opt/klai/scripts/
            chmod +x /opt/klai/scripts/smoke-docker-socket-proxy.sh

            cd /tmp && rm -rf klai-compose-sync
            echo "docker-compose.yml + grafana provisioning + scripts synced to /opt/klai/"

            # SPEC-SEC-024 M4.3 — non-blocking post-deploy smoke-test. Prints
            # [OK]/[FAIL] per probe; warns on non-zero exit but does NOT
            # fail the workflow (initial rollout per SPEC). Flip this to
            # blocking once we've seen it stable for 2 weeks.
            echo "::group::SPEC-SEC-024 post-deploy smoke-test"
            set +e
            /opt/klai/scripts/smoke-docker-socket-proxy.sh
            SMOKE_EXIT=$?
            set -e
            echo "::endgroup::"
            if [ "$SMOKE_EXIT" -ne 0 ]; then
              echo "::warning title=SPEC-SEC-024 smoke-test::Returned $SMOKE_EXIT (non-blocking). Check [FAIL] lines in the smoke-test group above."
            else
              echo "SPEC-SEC-024 smoke-test: PASS"
            fi
