# Daily drift check: Zitadel OIDC redirect_uris vs the validator allowlist
# in klai-portal/backend/app/api/auth.py.
#
# Why: the 2026-04-30 chat-iframe SSO outage (PR #243) was a hand-curated
# list drifting from the live Zitadel config. The contract test
# `test_static_system_subdomains_set_includes_known_oidc_apps` catches
# drift between the auth.py code and the docstring expectation, but it
# does NOT catch drift between EITHER of those and the live Zitadel
# state. This workflow closes that gap.
#
# Trigger: cron daily + manual workflow_dispatch.
# Action on drift: open or update a GitHub issue with the report.
#
# Required secret: ZITADEL_ADMIN_PAT (IAM_OWNER PAT for klai-admin-sa).
# Used read-only — the script only calls /apps/_search.

name: zitadel-oidc-drift

on:
  schedule:
    # 06:00 UTC daily — before working hours; gives operators a fresh
    # signal to act on at the start of the day.
    - cron: "0 6 * * *"
  workflow_dispatch: {}

permissions:
  contents: read
  issues: write

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Run drift check
        id: drift
        env:
          ZITADEL_ADMIN_PAT: ${{ secrets.ZITADEL_ADMIN_PAT }}
        run: |
          set -o pipefail
          python scripts/check_zitadel_oidc_drift.py \
            > drift-report.json \
            2> drift-stderr.txt
          status=$?
          echo "exit_code=$status" >> "$GITHUB_OUTPUT"
          # Always print the report so the workflow log is self-contained.
          cat drift-report.json
          echo "--- stderr ---"
          cat drift-stderr.txt
          # Re-emit the original exit code so the step status reflects it.
          exit $status
        continue-on-error: true

      - name: Open or update drift issue
        if: steps.drift.outputs.exit_code == '2'
        uses: actions/github-script@v8
        with:
          script: |
            const fs = require('fs');
            const report = fs.readFileSync('drift-report.json', 'utf8');
            const stderr = fs.readFileSync('drift-stderr.txt', 'utf8');
            const title = 'Zitadel OIDC drift detected';
            const body = [
              '## Drift report',
              '',
              'Generated by `.github/workflows/zitadel-oidc-drift.yml` at ' +
                new Date().toISOString() + '.',
              '',
              'See the full triage steps in `scripts/check_zitadel_oidc_drift.py`',
              'docstring and `.claude/rules/klai/pitfalls/process-rules.md` ' +
                '(allowlist-must-enumerate-all-host-classes).',
              '',
              '### stderr',
              '```',
              stderr.trim(),
              '```',
              '',
              '### Full report',
              '```json',
              report,
              '```',
            ].join('\n');

            const existing = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'oidc-drift',
              per_page: 5,
            });

            if (existing.data.length > 0) {
              const issue = existing.data[0];
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                body,
              });
              core.notice(`Updated existing drift issue #${issue.number}`);
            } else {
              const created = await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body,
                labels: ['oidc-drift', 'security'],
              });
              core.notice(`Opened drift issue #${created.data.number}`);
            }

      - name: Fail the workflow on drift
        if: steps.drift.outputs.exit_code != '0'
        run: |
          echo "Drift check exited with code ${{ steps.drift.outputs.exit_code }}"
          exit 1
