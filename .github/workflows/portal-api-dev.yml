name: Build and deploy portal-api-dev

# Deploys the feat/* branch as portal-api-dev alongside production portal-api.
# Isolated via separate container, image tag (:dev), database (klai_dev),
# and env file (.env.dev).

on:
  push:
    branches:
      - 'feat/**'
    paths:
      - 'klai-portal/backend/**'
      - 'deploy/docker-compose.dev.yml'
      - '.github/workflows/portal-api-dev.yml'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  quality:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: klai-portal/backend

    steps:
      - uses: actions/checkout@v6

      - uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync --group dev

      - name: Lint (ruff)
        run: uv run ruff check .

      - name: Format check (ruff)
        run: uv run ruff format --check .

      - name: Type check (pyright)
        run: uv run --with pyright pyright

  build-push:
    needs: quality
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and push portal-api:dev
        uses: docker/build-push-action@v7
        with:
          context: ./klai-portal/backend
          push: true
          tags: |
            ghcr.io/getklai/portal-api:dev
            ghcr.io/getklai/portal-api:dev-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: [build-push]
    runs-on: ubuntu-latest
    steps:
      - name: Sync docker-compose.dev.yml to core-01
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.CORE01_HOST }}
          username: klai
          key: ${{ secrets.CORE01_DEPLOY_KEY }}
          script: |
            set -e
            cd /tmp && rm -rf klai-dev-compose
            git clone --depth=1 --filter=blob:none --sparse --branch ${{ github.ref_name }} \
              https://github.com/GetKlai/klai.git klai-dev-compose
            cd klai-dev-compose
            git sparse-checkout set --skip-checks deploy/docker-compose.dev.yml
            cp deploy/docker-compose.dev.yml /opt/klai/docker-compose.dev.yml
            rm -rf /tmp/klai-dev-compose
            echo "docker-compose.dev.yml synced to /opt/klai/"

      - name: Pre-deploy env check
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.CORE01_HOST }}
          username: klai
          key: ${{ secrets.CORE01_DEPLOY_KEY }}
          script: |
            set -e
            REQUIRED="PORTAL_API_DEV_ZITADEL_PAT PORTAL_API_DEV_DB_PASSWORD PORTAL_API_DEV_PORTAL_SECRETS_KEY PORTAL_API_DEV_ENCRYPTION_KEY PORTAL_API_DEV_SSO_COOKIE_KEY PORTAL_API_DEV_INTERNAL_SECRET PORTAL_API_DEV_KLAI_CONNECTOR_SECRET"
            MISSING=""
            for VAR in $REQUIRED; do
              if ! grep -q "^${VAR}=" /opt/klai/.env; then
                MISSING="$MISSING $VAR"
              fi
            done
            if [ -n "$MISSING" ]; then
              echo "DEPLOY BLOCKED: missing in /opt/klai/.env:$MISSING"
              echo "Add PORTAL_API_DEV_* secrets to /opt/klai/.env before triggering."
              exit 1
            fi
            echo "Pre-flight OK — /opt/klai/.env has required dev secrets."

      - name: Deploy portal-api-dev to core-01
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.CORE01_HOST }}
          username: klai
          key: ${{ secrets.CORE01_DEPLOY_KEY }}
          script: |
            set -e
            source /opt/klai/.env
            echo "$GHCR_READ_PAT" | docker login ghcr.io -u mvletter --password-stdin
            docker pull ghcr.io/getklai/portal-api:dev
            cd /opt/klai && docker compose -f docker-compose.yml -f docker-compose.dev.yml up -d portal-api-dev
            sleep 5
            docker ps --filter name=portal-api-dev --format '{{.Names}} {{.Status}}'
