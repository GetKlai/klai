name: Build and push scribe-api

on:
  push:
    branches: [main]
    paths:
      - 'klai-scribe/scribe-api/**'
      - '.github/workflows/scribe-api.yml'
  workflow_dispatch:

permissions:
  contents: read
  packages: write
  security-events: write

env:
  # Opt in early to Node 24 for all JS-based actions (Node 20 EOL Sept 2026)
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build-push:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and push scribe-api
        uses: docker/build-push-action@v7
        with:
          context: ./klai-scribe/scribe-api
          push: true
          tags: |
            ghcr.io/getklai/scribe-api:latest
            ghcr.io/getklai/scribe-api:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy to core-01
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.CORE01_HOST }}
          username: klai
          key: ${{ secrets.CORE01_DEPLOY_KEY }}
          script: |
            set -e
            source /opt/klai/.env
            echo "$GHCR_READ_PAT" | docker login ghcr.io -u mvletter --password-stdin
            docker pull ghcr.io/getklai/scribe-api:latest
            cd /opt/klai && docker compose up -d scribe-api

  scan:
    needs: build-push
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      packages: read
    steps:
      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@0.35.0
        with:
          image-ref: ghcr.io/getklai/scribe-api:${{ github.sha }}
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH'
          ignore-unfixed: true
          exit-code: '0'

      - name: Upload Trivy SARIF to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'
