name: Build and push retrieval-api

on:
  push:
    branches: [main]
    paths:
      - 'retrieval-api/**'
      - '.github/workflows/retrieval-api.yml'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build-push:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push retrieval-api
        uses: docker/build-push-action@v6
        with:
          context: ./retrieval-api
          push: true
          tags: |
            ghcr.io/getklai/retrieval-api:latest
            ghcr.io/getklai/retrieval-api:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy to core-01
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.CORE01_HOST }}
          username: klai
          key: ${{ secrets.CORE01_DEPLOY_KEY }}
          envs: GHCR_TOKEN
          script_stop: true
          script: |
            echo "$GHCR_TOKEN" | docker login ghcr.io -u GetKlai --password-stdin
            docker pull ghcr.io/getklai/retrieval-api:latest
            cd /opt/klai && docker compose up -d retrieval-api
        env:
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
