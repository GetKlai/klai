name: Build and push knowledge-ingest

on:
  push:
    branches: [main]
    paths:
      - 'deploy/knowledge-ingest/**'
      - '.github/workflows/knowledge-ingest.yml'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build-push:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push knowledge-ingest
        uses: docker/build-push-action@v7
        with:
          context: ./deploy/knowledge-ingest
          push: true
          tags: |
            ghcr.io/getklai/knowledge-ingest:latest
            ghcr.io/getklai/knowledge-ingest:${{ github.sha }}
          # GHA layer cache disabled: it failed to invalidate on source code changes.
          # Builds are fast enough (~1 min) without caching.

      - name: Deploy to core-01
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.CORE01_HOST }}
          username: klai
          key: ${{ secrets.CORE01_DEPLOY_KEY }}
          script: |
            set -e
            source /opt/klai/.env
            echo "$GHCR_READ_PAT" | docker login ghcr.io -u mvletter --password-stdin
            docker pull ghcr.io/getklai/knowledge-ingest:latest
            cd /opt/klai && docker compose up -d knowledge-ingest
