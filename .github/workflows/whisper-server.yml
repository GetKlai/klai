name: Build and push whisper-server

on:
  push:
    branches: [main]
    paths:
      - 'scribe/whisper-server/**'
      - '.github/workflows/whisper-server.yml'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build-push:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push whisper-server
        uses: docker/build-push-action@v6
        with:
          context: ./scribe/whisper-server
          push: true
          tags: |
            ghcr.io/getklai/whisper-server:latest
            ghcr.io/getklai/whisper-server:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy to core-01
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.CORE01_HOST }}
          username: klai
          key: ${{ secrets.CORE01_DEPLOY_KEY }}
          script: |
            docker pull ghcr.io/getklai/whisper-server:latest
            cd /opt/klai && docker compose up -d whisper-server
