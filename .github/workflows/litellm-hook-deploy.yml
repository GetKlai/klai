name: Deploy LiteLLM hooks

on:
  push:
    branches: [main]
    paths:
      - 'deploy/litellm/**'
      - '.github/workflows/litellm-hook-deploy.yml'

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Set up SSH
        uses: webfactory/ssh-agent@v0.10.0
        with:
          ssh-private-key: ${{ secrets.CORE01_DEPLOY_KEY }}

      - name: Add core-01 to known_hosts
        run: ssh-keyscan -H ${{ secrets.CORE01_HOST }} >> ~/.ssh/known_hosts

      - name: Sync hook files to core-01
        run: rsync -av deploy/litellm/ klai@${{ secrets.CORE01_HOST }}:/opt/klai/litellm/

      - name: Restart LiteLLM
        run: ssh klai@${{ secrets.CORE01_HOST }} "cd /opt/klai && docker compose restart litellm"
