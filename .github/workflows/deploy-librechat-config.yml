name: Sync LibreChat base config to core-01

on:
  push:
    branches: [main]
    paths:
      - 'deploy/librechat/librechat.yaml'
      - 'deploy/librechat/mcp_catalog.yaml'
      - 'deploy/librechat/patches/**'
      - '.github/workflows/deploy-librechat-config.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  sync-librechat-config:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Sync base config and patches to core-01
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.CORE01_HOST }}
          username: klai
          key: ${{ secrets.CORE01_DEPLOY_KEY }}
          script: |
            set -e

            # Sparse-checkout the librechat config directory
            cd /tmp && rm -rf klai-librechat-sync
            git clone --depth=1 --filter=blob:none --sparse \
              https://github.com/GetKlai/klai.git klai-librechat-sync
            cd klai-librechat-sync
            git sparse-checkout set --skip-checks deploy/librechat

            # Sync base config (template for all tenants)
            cp deploy/librechat/librechat.yaml /opt/klai/librechat/librechat.yaml
            cp deploy/librechat/mcp_catalog.yaml /opt/klai/librechat/mcp_catalog.yaml

            # Sync patches (entrypoint, format.cjs, etc.)
            rsync -a --delete deploy/librechat/patches/ /opt/klai/librechat/patches/

            rm -rf /tmp/klai-librechat-sync

            echo "LibreChat base config synced to /opt/klai/librechat/"

            # Regenerate per-tenant configs from the updated base template.
            # portal-api exposes an internal endpoint that re-runs _generate_librechat_yaml
            # for each tenant, writes the result, flushes Redis, and restarts containers.
            #
            # portal-api has no host port mapping — it only listens on portal-api:8010
            # inside the klai-net Docker network. We therefore run the request *inside*
            # the portal-api container itself, where localhost:8010 is the API. We use
            # Python's httpx (already installed) instead of curl because the python:slim
            # base image does not ship curl. The INTERNAL_SECRET env var is already set
            # inside the container from .env.
            echo "Triggering tenant config regeneration via portal-api..."
            set +e
            RESPONSE=$(docker exec portal-api python -c '
            import os, sys, httpx
            secret = os.environ["INTERNAL_SECRET"]
            try:
                r = httpx.post(
                    "http://localhost:8010/internal/librechat/regenerate",
                    headers={
                        "Authorization": f"Bearer {secret}",
                        "Content-Type": "application/json",
                    },
                    timeout=120.0,
                )
                print(r.status_code)
                print(r.text)
            except Exception as exc:
                print("ERROR")
                print(f"Request failed: {exc}", file=sys.stderr)
                sys.exit(1)
            ')
            EXIT=$?
            set -e

            HTTP_CODE=$(echo "$RESPONSE" | head -n1)
            BODY=$(echo "$RESPONSE" | tail -n +2)

            if [ "$EXIT" = "0" ] && [ "$HTTP_CODE" = "200" ]; then
              echo "Tenant configs regenerated successfully"
              echo "$BODY"
            else
              echo "ERROR: Regeneration failed (exit=$EXIT, http=$HTTP_CODE)"
              echo "$BODY"
              # Fail the workflow — without regeneration the YAML change is not live.
              exit 1
            fi
