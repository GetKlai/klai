name: Build and sync widget bundle

on:
  push:
    branches: [main]
    paths:
      - 'klai-widget/src/**'
      - 'klai-widget/package.json'
      - 'klai-widget/vite.config.ts'
      - '.github/workflows/widget-bundle.yml'

jobs:
  check-sync:
    runs-on: ubuntu-latest
    name: Widget bundle check

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: klai-widget/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: klai-widget

      - name: Build widget bundle
        run: npm run build
        working-directory: klai-widget

      - name: Check bundle size
        run: |
          SIZE=$(wc -c < klai-widget/dist/klai-chat.js)
          GZIP_SIZE=$(gzip -c klai-widget/dist/klai-chat.js | wc -c)
          echo "Bundle: ${SIZE} bytes (gzip: ${GZIP_SIZE} bytes)"
          if [ "$GZIP_SIZE" -gt 204800 ]; then
            echo "::error::Widget bundle exceeds 200KB gzipped limit"
            exit 1
          fi

      - name: Verify portal bundle is in sync
        run: |
          if ! diff -q klai-widget/dist/klai-chat.js klai-portal/frontend/public/widget/klai-chat.js > /dev/null 2>&1; then
            echo "::error::Widget bundle in portal public/ is out of date. Run: cd klai-widget && npm run build && cp dist/klai-chat.js ../klai-portal/frontend/public/widget/"
            exit 1
          fi
          echo "Portal widget bundle is in sync"
