name: Build and sync widget bundle

on:
  push:
    branches: [main]
    paths:
      - 'klai-widget/src/**'
      - 'klai-widget/package.json'
      - 'klai-widget/vite.config.ts'
      - '.github/workflows/widget-bundle.yml'

jobs:
  build-sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: klai-widget/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: klai-widget

      - name: Build widget bundle
        run: npm run build
        working-directory: klai-widget

      - name: Check bundle size
        run: |
          SIZE=$(wc -c < klai-widget/dist/klai-chat.js)
          GZIP_SIZE=$(gzip -c klai-widget/dist/klai-chat.js | wc -c)
          echo "Bundle: ${SIZE} bytes (gzip: ${GZIP_SIZE} bytes)"
          # Fail if gzipped > 200KB (SPEC-WIDGET-001 limit)
          if [ "$GZIP_SIZE" -gt 204800 ]; then
            echo "::error::Widget bundle exceeds 200KB gzipped limit"
            exit 1
          fi

      - name: Sync to portal public
        run: |
          mkdir -p klai-portal/frontend/public/widget
          cp klai-widget/dist/klai-chat.js klai-portal/frontend/public/widget/klai-chat.js

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add klai-portal/frontend/public/widget/klai-chat.js
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore(widget): auto-sync klai-chat.js bundle to portal public/"
            git push
          fi
