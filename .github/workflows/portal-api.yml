name: Build and push portal-api

on:
  push:
    branches: [main]
    paths:
      - 'portal/backend/**'
      - '.github/workflows/portal-api.yml'

permissions:
  contents: read
  packages: write
  security-events: write

jobs:
  quality:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: portal/backend

    steps:
      - uses: actions/checkout@v6

      - uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync --group dev

      - name: Lint (ruff)
        run: uv run ruff check .

      - name: Format check (ruff)
        run: uv run ruff format --check .

      - name: Type check (pyright)
        run: uv run --with pyright pyright

      # CVE-2026-4539: ignored — package not directly exploitable in our context (sandboxed container,
      # no user-controlled input reaches the vulnerable code path). Re-assess Q3 2026.
      # See: https://github.com/GetKlai/klai/issues/62
      - name: Dependency vulnerability scan (pip-audit)
        run: uv run --with pip-audit pip-audit --ignore-vuln CVE-2026-4539

  build-push:
    needs: quality
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and push portal-api
        uses: docker/build-push-action@v7
        with:
          context: ./portal/backend
          push: true
          tags: |
            ghcr.io/getklai/portal-api:latest
            ghcr.io/getklai/portal-api:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  scan:
    needs: build-push
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      packages: read
    steps:
      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@0.35.0
        with:
          image-ref: ghcr.io/getklai/portal-api:${{ github.sha }}
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH'
          ignore-unfixed: true
          exit-code: '1'

      - name: Upload Trivy SARIF to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'

  deploy:
    needs: [build-push]
    runs-on: ubuntu-latest
    steps:
      - name: Pre-deploy env check
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.CORE01_HOST }}
          username: klai
          key: ${{ secrets.CORE01_DEPLOY_KEY }}
          script: |
            set -e
            cd /opt/klai
            REQUIRED="ZITADEL_PAT PORTAL_SECRETS_KEY SSO_COOKIE_KEY DOMAIN"
            MISSING=""
            for VAR in $REQUIRED; do
              VALUE=$(docker compose config portal-api 2>/dev/null | grep -E "^\s+${VAR}:" | sed "s/.*: *//" | tr -d '"' | xargs || true)
              if [ -z "$VALUE" ]; then
                MISSING="$MISSING $VAR"
              fi
            done
            if [ -n "$MISSING" ]; then
              echo "DEPLOY BLOCKED: critical env vars are empty:$MISSING"
              echo "Push an update to klai-infra/core-01/.env.sops first."
              echo "The sync-env workflow will update the server automatically."
              exit 1
            fi
            echo "Pre-flight OK — all critical vars present."

      - name: Deploy to core-01
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.CORE01_HOST }}
          username: klai
          key: ${{ secrets.CORE01_DEPLOY_KEY }}
          script: |
            set -e
            source /opt/klai/.env
            echo "$GHCR_READ_PAT" | docker login ghcr.io -u mvletter --password-stdin
            docker pull ghcr.io/getklai/portal-api:latest
            cd /opt/klai && docker compose up -d portal-api
