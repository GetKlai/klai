name: Build and push portal-api

on:
  push:
    branches: [main]
    paths:
      - 'klai-portal/backend/**'
      - '.github/workflows/portal-api.yml'
  pull_request:
    branches: [main]
    paths:
      - 'klai-portal/backend/**'
      - '.github/workflows/portal-api.yml'

permissions:
  contents: read
  packages: write
  security-events: write

env:
  # Opt in early to Node 24 for all JS-based actions (Node 20 EOL Sept 2026)
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  quality:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: klai-portal/backend

    steps:
      - uses: actions/checkout@v6

      - uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: uv sync --group dev

      - name: Lint (ruff)
        run: uv run ruff check .

      - name: Format check (ruff)
        run: uv run ruff format --check .

      # SPEC-SEC-024-R7 — block reintroduction of docker exec_run in portal-api
      # production code. Rule lives at rules/no-exec-run.yml, configured by
      # sgconfig.yml at repo root. `uses:` steps ignore the job's
      # defaults.run.working-directory and run from $GITHUB_WORKSPACE, so the
      # relative paths resolve correctly.
      - name: Guard — no exec_run in production code (SPEC-SEC-024)
        uses: ast-grep/action@cf62e780f0c88301228978d593a7784427a097a6  # v1.5.0
        with:
          config: sgconfig.yml
          paths: klai-portal/backend/app

      - name: Type check (pyright)
        run: uv run --with pyright pyright

      # CVE-2026-4539: ignored — package not directly exploitable in our context (sandboxed container,
      # no user-controlled input reaches the vulnerable code path). Re-assess Q3 2026.
      # See: https://github.com/GetKlai/klai/issues/62
      - name: Dependency vulnerability scan (pip-audit)
        run: uv run --with pip-audit pip-audit --ignore-vuln CVE-2026-4539 --ignore-vuln CVE-2025-71176

      # Guards against the two classes of alembic mistakes we've been bitten by:
      # 1. Hand-typed rev ids (SPEC-KB-020: duplicate `a1b2c3d4e5f6` crashed
      #    `alembic upgrade head` in production).
      # 2. Orphan branches (SPEC-PROV-001 deploy: two heads caused
      #    `alembic heads` to report ambiguous state).
      # Enforced here so a PR that introduces either can never reach main.
      - name: Alembic integrity (single head, no duplicate rev ids)
        run: uv run python scripts/validate_alembic.py

      - name: Test (pytest)
        run: uv run pytest -q --tb=short

  build-push:
    needs: quality
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and push portal-api
        uses: docker/build-push-action@v7
        with:
          context: ./klai-portal/backend
          push: true
          tags: |
            ghcr.io/getklai/portal-api:latest
            ghcr.io/getklai/portal-api:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  scan:
    needs: build-push
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      packages: read
    steps:
      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@0.35.0
        with:
          image-ref: ghcr.io/getklai/portal-api:${{ github.sha }}
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH'
          ignore-unfixed: true
          exit-code: '1'

      - name: Upload Trivy SARIF to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'

  deploy:
    needs: [build-push]
    runs-on: ubuntu-latest
    steps:
      - name: Pre-deploy env check
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.CORE01_HOST }}
          username: klai
          key: ${{ secrets.CORE01_DEPLOY_KEY }}
          script: |
            set -e
            cd /opt/klai
            REQUIRED="ZITADEL_PAT PORTAL_SECRETS_KEY SSO_COOKIE_KEY DOMAIN"
            MISSING=""
            for VAR in $REQUIRED; do
              VALUE=$(docker compose config portal-api 2>/dev/null | grep -E "^\s+${VAR}:" | sed "s/.*: *//" | tr -d '"' | xargs || true)
              if [ -z "$VALUE" ]; then
                MISSING="$MISSING $VAR"
              fi
            done
            if [ -n "$MISSING" ]; then
              echo "DEPLOY BLOCKED: critical env vars are empty:$MISSING"
              echo "Push an update to klai-infra/core-01/.env.sops first."
              echo "The sync-env workflow will update the server automatically."
              exit 1
            fi
            echo "Pre-flight OK — all critical vars present."

      - name: Deploy to core-01
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.CORE01_HOST }}
          username: klai
          key: ${{ secrets.CORE01_DEPLOY_KEY }}
          script: |
            set -e
            source /opt/klai/.env
            echo "$GHCR_READ_PAT" | docker login ghcr.io -u mvletter --password-stdin
            docker pull ghcr.io/getklai/portal-api:latest
            cd /opt/klai && docker compose up -d portal-api
