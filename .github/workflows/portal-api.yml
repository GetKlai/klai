name: Build and push portal-api

on:
  push:
    branches: [main]
    paths:
      - 'portal/backend/**'
      - '.github/workflows/portal-api.yml'

permissions:
  contents: read
  packages: write

jobs:
  quality:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: portal/backend

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync --group dev

      - name: Lint (ruff)
        run: uv run ruff check .

      - name: Format check (ruff)
        run: uv run ruff format --check .

      - name: Type check (pyright)
        run: uv run --with pyright pyright

      - name: Dependency vulnerability scan (pip-audit)
        run: uv run --with pip-audit pip-audit

  build-push:
    needs: quality
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push portal-api
        uses: docker/build-push-action@v6
        with:
          context: ./portal/backend
          push: true
          tags: |
            ghcr.io/getklai/portal-api:latest
            ghcr.io/getklai/portal-api:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy to core-01
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.CORE01_HOST }}
          username: klai
          key: ${{ secrets.CORE01_DEPLOY_KEY }}
          script: |
            docker pull ghcr.io/getklai/portal-api:latest
            cd /opt/klai && docker compose up -d portal-api
