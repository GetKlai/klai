# Release workflow — builds klai-chat.js and uploads to CDN.
# CDN credentials are NOT configured yet (stub workflow).
# To activate: add HETZNER_ACCESS_KEY and HETZNER_SECRET_KEY secrets,
# then uncomment the upload step.

name: Release Widget

on:
  push:
    tags:
      - "v*.*.*"

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: klai-widget/package-lock.json

      - name: Install dependencies
        working-directory: klai-widget
        run: npm ci

      - name: Build bundle
        working-directory: klai-widget
        run: npm run build

      - name: Check bundle size
        working-directory: klai-widget
        run: node scripts/check-bundle-size.mjs

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: klai-chat-js
          path: klai-widget/dist/klai-chat.js

