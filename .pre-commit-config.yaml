repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.11.2
    hooks:
      - id: ruff
        args: [--fix]
        files: ^backend/
      - id: ruff-format
        files: ^backend/

  - repo: local
    hooks:
      - id: pyright
        name: pyright
        entry: bash -c 'cd backend && uv run --with pyright pyright'
        language: system
        files: ^backend/.*\.py$
        pass_filenames: false

      - id: pip-audit
        name: pip-audit
        entry: bash -c 'cd backend && uv run --with pip-audit pip-audit'
        language: system
        files: ^backend/pyproject\.toml$
        pass_filenames: false
