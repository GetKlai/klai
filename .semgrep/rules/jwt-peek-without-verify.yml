# SPEC-SEC-AUDIT-2026-04 — finding B4
#
# Custom Semgrep rule that catches the HKDF-per-tenant JWT "peek-then-verify"
# pattern when the verified decode has been removed. The default
# `python.jwt.security.unverified-jwt-decode` rule is too noisy for klai
# because partner_dependencies.py legitimately needs an unverified peek to
# read `org_id` BEFORE deriving the per-tenant signing key — that rule is
# suppressed via `# nosemgrep` at the call site.
#
# This rule is the regression guard. It fires only when an unverified
# `jwt.decode(..., options={"verify_signature": False})` appears in a
# function (or module) that does NOT also contain a recognised verified-
# decode shape. If a future refactor removes the verified decode at line
# 137 of partner_dependencies.py, the peek becomes a pure authentication
# bypass and this rule fails CI.
#
# The verified-decode follow-throughs we accept (any one suppresses the
# finding for the entire enclosing function):
#
#   1. `decode_session_token(...)` — the canonical klai widget-token wrapper
#      that lives in `klai-portal/backend/app/services/widget_auth.py` and
#      enforces signature + algorithm + tenant binding.
#   2. `jwt.decode(..., options={"verify_signature": True})` — explicit
#      re-decode with verification enabled. (Pyjwt's default is True, so a
#      bare `jwt.decode(token, key, ...)` without options also matches via
#      the bare-decode pattern below.)
#   3. `jwt.decode($T, $KEY, ...)` — bare positional-key decode. PyJWT
#      enforces signature when a key argument is provided.
#   4. `jwt.decode($T, key=$KEY, ...)` — keyword-key form of (3).
#
# We use `pattern-not-inside: def $F(...): ... <verified-decode> ...` for
# each of the four shapes. Semgrep's `pattern-not-inside` looks for ANY
# occurrence of the inner pattern within the enclosing function body,
# regardless of nesting under `try`/`except`/`if`/etc. This is robust
# against the partner_dependencies.py shape where the peek and the
# verified decode each live in their own `try` block.
#
# False-negative bias: we prefer to MISS regressions rather than fire on
# legitimate code. A reviewer who hits this rule on real peek-then-verify
# code should add a fifth pattern-not-inside branch for the new wrapper
# helper — DO NOT loosen the primary `pattern` to fix a false positive,
# that would weaken the regression guard for unrelated code paths.
#
# See:
#   - SPEC-SEC-HYGIENE-001 REQ-24 (HKDF-per-tenant signing key derivation)
#   - SPEC-SEC-AUDIT-2026-04 finding B4 (re-audit follow-up)
#   - klai-portal/backend/app/api/partner_dependencies.py lines 100-145
#     (canonical peek-then-verify pattern)
#   - klai-portal/backend/app/services/widget_auth.py:137
#     (decode_session_token — the verified follow-through)

rules:
  - id: jwt-peek-without-verify
    message: |
      JWT unverified decode (verify_signature=False) is not paired with any
      recognised verified decode in the enclosing function. The HKDF-per-
      tenant pattern (SPEC-SEC-HYGIENE-001 REQ-24) requires three steps:
        1. unverified peek to read org_id / tenant
        2. derive signing key from the tenant slug (HKDF)
        3. VERIFIED decode using the derived key
      If you have removed step 3, this is now an authentication bypass —
      a forged token will be accepted on its claimed `org_id` value.
      If you are introducing a new verified-decode wrapper, add it as a
      pattern-not-inside branch in .semgrep/rules/jwt-peek-without-verify.yml.
      See SPEC-SEC-AUDIT-2026-04 finding B4.
    severity: ERROR
    languages: [python]
    patterns:
      # Primary pattern: unverified peek-decode anywhere in a function body.
      - pattern: |
          jwt.decode(..., options={"verify_signature": False})
      # Suppress when the same function ALSO contains
      # `decode_session_token(...)` — the canonical klai verified wrapper.
      - pattern-not-inside: |
          def $F(...):
              ...
              jwt.decode(..., options={"verify_signature": False})
              ...
              decode_session_token(...)
              ...
      # Suppress when the same function contains an explicit
      # `verify_signature=True` re-decode.
      - pattern-not-inside: |
          def $F(...):
              ...
              jwt.decode(..., options={"verify_signature": False})
              ...
              jwt.decode(..., options={"verify_signature": True})
              ...
      # Suppress when the same function contains a bare positional-key
      # decode (PyJWT enforces signature when a key is present).
      - pattern-not-inside: |
          def $F(...):
              ...
              jwt.decode(..., options={"verify_signature": False})
              ...
              jwt.decode($T, $KEY, ...)
              ...
      # Suppress when the same function contains a keyword-form decode
      # `key=...`.
      - pattern-not-inside: |
          def $F(...):
              ...
              jwt.decode(..., options={"verify_signature": False})
              ...
              jwt.decode(..., key=$KEY, ...)
              ...
      # Same four branches for `async def`.
      - pattern-not-inside: |
          async def $F(...):
              ...
              jwt.decode(..., options={"verify_signature": False})
              ...
              decode_session_token(...)
              ...
      - pattern-not-inside: |
          async def $F(...):
              ...
              jwt.decode(..., options={"verify_signature": False})
              ...
              jwt.decode(..., options={"verify_signature": True})
              ...
      - pattern-not-inside: |
          async def $F(...):
              ...
              jwt.decode(..., options={"verify_signature": False})
              ...
              jwt.decode($T, $KEY, ...)
              ...
      - pattern-not-inside: |
          async def $F(...):
              ...
              jwt.decode(..., options={"verify_signature": False})
              ...
              jwt.decode(..., key=$KEY, ...)
              ...
    metadata:
      category: security
      cwe: "CWE-345: Insufficient Verification of Data Authenticity"
      owasp: "A02:2021 - Cryptographic Failures"
      spec: SPEC-SEC-AUDIT-2026-04
      finding: B4
      references:
        - https://github.com/GetKlai/klai/blob/main/klai-portal/backend/app/api/partner_dependencies.py
        - https://github.com/GetKlai/klai/blob/main/klai-portal/backend/app/services/widget_auth.py
